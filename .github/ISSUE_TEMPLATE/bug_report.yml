name: Bug report
description: Something in the harness isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please confirm it still reproduces on the latest
        release first (`keelson update --check`). For a security issue, do **not**
        file here — see [SECURITY.md](https://github.com/danielscholl/keelson/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: The actual behavior, with the exact command or UI action that triggered it.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. keelson service start
        2. open the model picker
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Paste the output of `keelson doctor`, plus your OS and which provider you were using (copilot / claude / pi / stub).
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Anything useful from `~/.keelson/logs/server.log`. Redact credentials.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before filing
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: This is a harness bug, not a question about a specific rib.
          required: false
