# Dependabot configuration.
#
# Bun monorepo: Dependabot's "npm" ecosystem doesn't natively understand
# bun.lock, but it CAN bump versions in each workspace's package.json. CI
# (bun install --frozen-lockfile) would reject any PR whose package.json
# updates don't match the committed bun.lock. The dependabot-bun-lock.yml
# workflow closes that gap: on every Dependabot PR it regenerates bun.lock
# (`bun install --lockfile-only`) and pushes it onto the branch, so the
# frozen-lockfile install passes without a manual refresh.
#
# One npm entry per workspace because Dependabot scans the `directory`
# only, not the workspace tree.
#
# npm entries carry a 7-day cooldown, matching bunfig.toml's
# minimumReleaseAge: releases must only pin versions old enough to have
# cleared corporate vetting feeds' quarantine holds.

version: 2
updates:
  # Root workspace (Biome, TypeScript, @types/node)
  - package-ecosystem: npm
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - "@types/*"
      dev-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/apps/cli"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - apps/cli
    groups:
      dev-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/apps/server"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - apps/server
    groups:
      dev-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/apps/web"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - apps/web
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      dev-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/packages/shared"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - packages/shared

  - package-ecosystem: npm
    directory: "/packages/workflows"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - packages/workflows

  - package-ecosystem: npm
    directory: "/packages/providers"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - packages/providers
    # Vendor SDKs: pin commits via the lockfile, take majors deliberately.
    ignore:
      - dependency-name: "@anthropic-ai/claude-agent-sdk"
        update-types:
          - version-update:semver-major
      - dependency-name: "@github/copilot-sdk"
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: "/packages/skills"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - packages/skills

  # GitHub Actions used in .github/workflows/ci.yml
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
