name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The release upload uses GITHUB_TOKEN directly, so the checkout
          # doesn't need to persist git credentials into .git/config.
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to the validated runtime, matching ci.yml.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The release version is derived from packages/shared/package.json, so a
      # tag that disagrees would publish mislabeled artifacts. Fail loudly first.
      - name: Verify tag matches package version
        run: |
          pkg_version="$(bun -e 'console.log(require("./packages/shared/package.json").version)')"
          if [ "${GITHUB_REF_NAME}" != "v${pkg_version}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match package version v${pkg_version}" >&2
            echo "bump packages/shared/package.json (and root) to match the tag, or retag." >&2
            exit 1
          fi
          echo "tag ${GITHUB_REF_NAME} matches package version v${pkg_version}"

      # Bundles @keelson/cli (server inlined; shared/zod/keyring external) and
      # packs @keelson/shared, then renames to stable asset names + emits
      # install.sh. The bundle is platform-independent — the native
      # @napi-rs/keyring is fetched per-platform when the home runs `bun install`.
      - name: Build release artifacts
        run: bun scripts/build-release.ts

      # The GitHub Release body is what `keelson update` shows as the notes for
      # this version — populate it from the CHANGELOG section for the tag.
      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "no CHANGELOG section for $version — add a '## [$version]' entry" >&2
            exit 1
          fi

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/release/keelson-cli.tgz
            dist/release/keelson-shared.tgz
            dist/release/install.sh
          fail_on_unmatched_files: true
