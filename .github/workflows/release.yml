name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to the validated runtime, matching ci.yml.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Bundles @keelson/cli (server inlined; shared/zod/keyring external) and
      # packs @keelson/shared, then renames to stable asset names + emits
      # install.sh. The bundle is platform-independent — the native
      # @napi-rs/keyring is fetched per-platform when the home runs `bun install`.
      - name: Build release artifacts
        run: bun scripts/build-release.ts

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/keelson-cli.tgz
            dist/release/keelson-shared.tgz
            dist/release/install.sh
          fail_on_unmatched_files: true
