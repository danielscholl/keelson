name: Release

# Release-please watches main: conventional commits accumulate into a release
# PR (version bumps + CHANGELOG); merging that PR creates the tag and the
# GitHub Release. The publish job must chain off release-please's outputs —
# tags created with GITHUB_TOKEN never trigger their own workflow runs.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # A RELEASE_PLEASE_TOKEN PAT (optional) makes CI run on the release
          # PR; with the default GITHUB_TOKEN the PR gets no workflow runs.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build and publish release artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          # The release upload uses GITHUB_TOKEN directly, so the checkout
          # doesn't need to persist git credentials into .git/config.
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pin to the validated runtime, matching ci.yml.
          bun-version: 1.3.14

      - name: Install dependencies
        uses: ./.github/actions/bun-install

      # build-release.ts derives the artifact version from
      # packages/shared/package.json — a mismatch here means the extra-files
      # list in release-please-config.json lost a workspace. Fail loudly.
      - name: Verify tag matches package version
        run: |
          pkg_version="$(bun -e 'console.log(require("./packages/shared/package.json").version)')"
          tag="${{ needs.release-please.outputs.tag_name }}"
          if [ "${tag}" != "v${pkg_version}" ]; then
            echo "tag ${tag} does not match package version v${pkg_version}" >&2
            echo "check the extra-files list in release-please-config.json." >&2
            exit 1
          fi
          echo "tag ${tag} matches package version v${pkg_version}"

      # Bundles @keelson/cli (server inlined; shared/zod/keyring external) and
      # packs @keelson/shared, then renames to stable asset names + emits
      # install.sh and install.ps1. The bundle is platform-independent — the native
      # @napi-rs/keyring is fetched per-platform when the home runs `bun install`.
      - name: Build release artifacts
        run: bun scripts/build-release.ts

      # release-please already wrote the release body (what `keelson update`
      # shows as the notes); this only attaches the artifacts.
      - name: Upload artifacts to the GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/release/keelson-cli.tgz
            dist/release/keelson-shared.tgz
            dist/release/install.sh
            dist/release/install.ps1
          fail_on_unmatched_files: true

  # Catch a silently-dropped release: if a release PR merges without its
  # `autorelease: pending` label (a GitHub label-API flake at PR-creation time
  # can strip it), release-please bumps the manifest on main but never tags or
  # publishes — a green run with no release. Assert the manifest version has a
  # matching GitHub Release so that turns into a red build instead of a gap.
  verify-release:
    name: Verify release exists for manifest version
    needs: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Assert a GitHub Release exists for the manifest version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(jq -r '.["."]' .release-please-manifest.json)"
          tag="v${version}"
          # release-please creates the Release in the job above; retry to ride
          # out GitHub's eventual consistency before failing.
          for attempt in 1 2 3; do
            if gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              echo "ok: release ${tag} exists for manifest version ${version}"
              exit 0
            fi
            echo "attempt ${attempt}: ${tag} not visible yet; retrying in 5s"
            sleep 5
          done
          echo "::error::.release-please-manifest.json is at ${version} but no ${tag} release exists — a release was silently dropped. Most likely a release PR merged without its 'autorelease: pending' label; re-label the merged release PR and re-run this workflow to recover it." >&2
          exit 1
