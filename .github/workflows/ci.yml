name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # CI only reads the repo; don't persist the token into .git/config.
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pin to the validated runtime. Bump deliberately, not via `latest`,
          # so upstream Bun changes can't break CI silently between PRs.
          # 1.3.14 is the version Windows support was validated against
          # (1.3.13 fails the worktree frozen-lockfile install on win32).
          bun-version: 1.3.14

      - name: Install dependencies
        uses: ./.github/actions/bun-install

      - name: Lint + format check
        run: bun run check

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Test
        # Per-test timeout so a stalled test fails fast (named) instead of
        # hanging the job until the wall-clock ceiling — see the win32 note below.
        run: bun --filter '*' test --timeout 120000
        env:
          KEELSON_USE_STUBS: "1"

      - name: Build
        run: bun --filter '*' build

  # Keeps the Windows support green. Typecheck + test only: lint/format and
  # the build are platform-independent (.gitattributes forces LF everywhere),
  # so the ubuntu job already covers them.
  check-windows:
    name: Typecheck and test (Windows)
    runs-on: windows-latest
    # Bounded well above a normal (~4 min) run so a win32 test-exit stall
    # cancels fast instead of running out a long silent timeout.
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # CI only reads the repo; don't persist the token into .git/config.
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        uses: ./.github/actions/bun-install

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Test
        # Per-test timeout so a stalled test fails fast (named) instead of
        # hanging the job until the wall-clock ceiling — see the win32 note below.
        run: bun --filter '*' test --timeout 120000
        env:
          KEELSON_USE_STUBS: "1"
