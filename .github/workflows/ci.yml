name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to the validated runtime. Bump deliberately, not via `latest`,
          # so upstream Bun changes can't break CI silently between PRs.
          # 1.3.14 is the version Windows support was validated against
          # (1.3.13 fails the worktree frozen-lockfile install on win32).
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + format check
        run: bun run check

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Test
        run: bun --filter '*' test
        env:
          KEELSON_USE_STUBS: "1"

      - name: Build
        run: bun --filter '*' build

  # Keeps the Windows support green. Typecheck + test only: lint/format and
  # the build are platform-independent (.gitattributes forces LF everywhere),
  # so the ubuntu job already covers them.
  check-windows:
    name: Typecheck and test (Windows)
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Test
        run: bun --filter '*' test
        env:
          KEELSON_USE_STUBS: "1"
