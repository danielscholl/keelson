name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin to the validated runtime. Bump deliberately, not via `latest`,
          # so upstream Bun changes can't break CI silently between PRs.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + format check
        run: bun run check

      - name: Typecheck
        run: bun --filter '*' typecheck

      - name: Test
        run: bun --filter '*' test
        env:
          KEELSON_USE_STUBS: "1"

      - name: Build
        run: bun --filter '*' build
