# E2E smoke test — every CI-compatible node type that runs on Bun alone.
# Covers: prompt, command, loop (AI node types) + bash, script bun
#   (deterministic node types) + depends_on / when / trigger_rule / $nodeId.output
#   (DAG features).
# Skipped: `approval:` — pauses for human input, incompatible with CI.
# Skipped: `runtime: uv` — see python-smoke-test.yaml for the Python demo;
#   keeping this workflow Bun-only means the README quick-start has zero
#   non-Bun prerequisites.
# No provider pin — runs against whichever provider the server has registered
# as default (stub / claude / copilot). Adjust per-node `model:` if you want
# to exercise a specific backend.

name: smoke-test
description: End-to-end smoke covering every CI-compatible node type (Bun-only).

nodes:
  # ─── AI node types ──────────────────────────────────────────────────────

  # 1. prompt: inline prompt + effort + allowed_tools (no tool calls).
  #    Verifies reasoningEffort and availableTools=[] reach the SDK.
  - id: prompt-node
    prompt: "Reply with exactly the single word 'ok' and nothing else."
    allowed_tools: []
    effort: low
    idle_timeout: 30000

  # 2. command: named command file (.keelson/commands/e2e-echo-command.md).
  #    The command echoes back $ARGUMENTS (the workflow invocation message).
  - id: command-node
    command: e2e-echo-command
    allowed_tools: []
    idle_timeout: 30000

  # 3. loop: iterative AI prompt until completion signal. Bounded by
  #    max_iterations: 2 so a misbehaving model can't hang CI. The schema
  #    reports allowed_tools / effort as "ignored on loop" — omitted here so
  #    the loader emits zero warnings.
  - id: loop-node
    loop:
      prompt: "Reply with exactly 'DONE' and nothing else."
      until: 'DONE'
      max_iterations: 2
    idle_timeout: 60000

  # ─── Deterministic node types (no AI) ───────────────────────────────────

  # 4. bash: shell script with JSON output (enables $nodeId.output.status
  #    dot-access downstream).
  - id: bash-json-node
    bash: 'echo ''{"status":"ok"}'''

  # 5. script: bun (TypeScript/JavaScript runtime)
  - id: script-bun-node
    script: echo-args
    runtime: bun
    timeout: 30000

  # ─── DAG features ───────────────────────────────────────────────────────

  # 6. depends_on + safe env-channel access to upstream output. The bash
  # handler runs the raw body (pre-substitution) to dodge command injection
  # via upstream text; authors reach upstream output through KEELSON_NODE_*.
  - id: downstream
    bash: 'echo "downstream got: $KEELSON_NODE_prompt_node_OUTPUT"'
    depends_on: [prompt-node]

  # 7. when: conditional (JSON dot-access on bash JSON output)
  - id: gated
    bash: "echo 'gated-ok'"
    depends_on: [bash-json-node]
    when: "$bash-json-node.output.status == 'ok'"

  # 8. trigger_rule: merge multiple deps (all_success semantics)
  - id: merge
    bash: "echo 'merge-ok'"
    depends_on: [downstream, gated, script-bun-node]
    trigger_rule: all_success

  # ─── Final assertion ────────────────────────────────────────────────────

  # 9. Verify every upstream node produced non-empty output. Upstream values
  #     are read through the KEELSON_NODE_<id>_OUTPUT env channel: the bash
  #     handler runs the raw body (pre-substitution) on purpose, so the
  #     `$nodeId.output` form would not expand at all here. The `when:` gates
  #     above already proved the workflow-level JSON dot-access path works.
  - id: assert
    bash: |
      fail=0
      check() {
        local name="$1"
        local value="$2"
        if [ -z "$value" ]; then
          echo "FAIL: $name produced empty output"
          fail=1
        fi
      }
      check prompt-node      "$KEELSON_NODE_prompt_node_OUTPUT"
      check command-node     "$KEELSON_NODE_command_node_OUTPUT"
      check loop-node        "$KEELSON_NODE_loop_node_OUTPUT"
      check bash-json-node   "$KEELSON_NODE_bash_json_node_OUTPUT"
      check script-bun-node  "$KEELSON_NODE_script_bun_node_OUTPUT"
      check downstream       "$KEELSON_NODE_downstream_OUTPUT"
      check gated            "$KEELSON_NODE_gated_OUTPUT"
      check merge            "$KEELSON_NODE_merge_OUTPUT"

      if [ "$fail" -eq 1 ]; then exit 1; fi
      echo "PASS: all node types verified"
    depends_on: [merge, loop-node, command-node]
    trigger_rule: all_success
