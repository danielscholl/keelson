# Python runtime smoke test — demonstrates the `runtime: uv` script-node path.
# Requires `uv` (https://docs.astral.sh/uv/) on PATH. Skip this workflow if
# you don't have uv installed; smoke-test.yaml covers the Bun-only path.
#
# What this exercises:
#   - script-node with runtime: uv (Python execution via uv run)
#   - $nodeId.output flow from a Python emitter into a bash consumer
#
# Run it with: keelson workflow run python-smoke-test

name: python-smoke-test
description: "Demonstrates the `runtime: uv` (Python) script-node path."

nodes:
  # 1. script: uv (Python runtime). Emits JSON to stdout.
  - id: emit-python
    script: echo-py
    runtime: uv
    timeout: 30000

  # 2. bash: read the upstream output through KEELSON_NODE_*. The bash
  #    handler runs the raw body (pre-substitution); upstream values flow
  #    via the env channel, not $nodeId.output substitution.
  - id: consume
    bash: |
      if [ -z "$KEELSON_NODE_emit_python_OUTPUT" ]; then
        echo "FAIL: emit-python produced empty output"
        exit 1
      fi
      echo "PASS: received from Python: $KEELSON_NODE_emit_python_OUTPUT"
    depends_on: [emit-python]
