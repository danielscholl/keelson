name: memory-demo
description: |
  Demonstrates the M5 memory: block — pre-run recall, post-run writeback.
  Runs a bash node that emits a deterministic summary, recalls prior
  matching memory before the node runs, and writes a new lesson-type entry
  back when the node succeeds. Run it twice across different conversations
  to see recall surface run 1's writeback in run 2.

  Requires `keelson serve` — the in-process headless path refuses workflows
  with memory: blocks (server-required for memory).

nodes:
  - id: observe
    bash: |
      echo "observation recorded: $ARGUMENTS"
    memory:
      recall:
        query: prior observations
        limits: { maxItems: 5, recencyDays: 90 }
      writeback:
        on: success
        type: lesson
        summary: "Observation captured"
        content: |
          Observed: $observe.output
        sourceRefs:
          - kind: workflow_run
            uri: memory-demo
