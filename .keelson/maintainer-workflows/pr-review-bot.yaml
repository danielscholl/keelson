# Keelson PR-review bot. A focused, claude-friendly cousin of the bundled
# pr-review workflow: one correctness-and-conventions lane instead of the full
# multi-lane smart review, so it stays cheap and predictable for an on-demand
# `/keelson review` trigger.
#
# Read-only by harness rail: the review node sets allowed_tools to
# [Read, Glob, Grep], so the model's write/shell tools are denied mid-review
# regardless of provider. The only repo-mutating step is the final `gh pr
# comment`, in a bash node.
#
# The PR number arrives as the run's arguments and reaches the scope bash node
# through the safe env channel ($KEELSON_ARGUMENTS).
#
# DRY_RUN: set KEELSON_PR_REVIEW_DRY_RUN=1 (the default) to print the review
# without posting. The Action sets it to 0 to post for real.

name: pr-review-bot
description: |
  Use when: A maintainer asks for a focused correctness + conventions review of
            one GitHub PR, posted back as a PR comment.
  Triggers: "/keelson review", "review pr <n>".
  Does: Resolves the PR number from the run arguments -> fetches the diff ->
        reviews it for correctness bugs and keelson convention drift ->
        posts the review as a PR comment.
  NOT for: Triaging issues (use repo-triage). Mutating the PR branch.

nodes:
  # ── Layer 0: scope (no AI) ──

  - id: scope
    timeout: 120000
    bash: |
      set -euo pipefail
      RAW=$(printf '%s' "${KEELSON_ARGUMENTS:-}" | grep -oE '[0-9]+' | head -1 || true)
      if [ -z "$RAW" ]; then
        RAW=$(gh pr view --json number -q '.number' 2>/dev/null || true)
      fi
      if [ -z "$RAW" ]; then
        echo "Could not resolve a PR number from arguments ('${KEELSON_ARGUMENTS:-}')." >&2
        exit 1
      fi
      PR_NUM="$RAW"
      echo "$PR_NUM" > "$KEELSON_ARTIFACTS_DIR/.pr-number"

      gh pr view "$PR_NUM" \
        --json number,title,body,baseRefName,headRefName,author,url,state \
        > "$KEELSON_ARTIFACTS_DIR/pr.json"
      gh pr diff "$PR_NUM" --name-only > "$KEELSON_ARTIFACTS_DIR/changed-files.txt" 2>/dev/null || true
      gh pr diff "$PR_NUM"               > "$KEELSON_ARTIFACTS_DIR/diff.patch"         2>/dev/null || true

      FILES=$(grep -c . "$KEELSON_ARTIFACTS_DIR/changed-files.txt" 2>/dev/null || echo 0)
      LINES=$(wc -l < "$KEELSON_ARTIFACTS_DIR/diff.patch" 2>/dev/null | tr -d ' ')

      cat > "$KEELSON_ARTIFACTS_DIR/scope.md" <<EOF
      # PR #${PR_NUM}
      - Title: $(jq -r '.title' "$KEELSON_ARTIFACTS_DIR/pr.json")
      - Author: $(jq -r '.author.login' "$KEELSON_ARTIFACTS_DIR/pr.json")
      - Base <- Head: $(jq -r '.baseRefName' "$KEELSON_ARTIFACTS_DIR/pr.json") <- $(jq -r '.headRefName' "$KEELSON_ARTIFACTS_DIR/pr.json")
      - Files changed: ${FILES}   Diff lines: ${LINES}
      - URL: $(jq -r '.url' "$KEELSON_ARTIFACTS_DIR/pr.json")
      EOF

      echo "PR_NUMBER=${PR_NUM} FILES=${FILES} LINES=${LINES}"
      cat "$KEELSON_ARTIFACTS_DIR/scope.md"

  # ── Layer 1: review (the only AI node; read-only tools) ──

  - id: review
    depends_on: [scope]
    context: fresh
    idle_timeout: 180000
    allowed_tools: [Read, Glob, Grep]
    prompt: |
      You are a senior reviewer doing a correctness-and-conventions pass on a
      keelson pull request.

      ## Scope

      $scope.output

      ## Instructions

      1. Read `CLAUDE.md` and `CONTRIBUTING.md` for keelson's conventions and its
         comment policy before you read the diff.
      2. Read the diff at `$ARTIFACTS_DIR/diff.patch` with the Read tool. Open any
         changed source file you need for context.
      3. Flag only real issues: correctness bugs, race conditions, missing input
         validation, broken invariants, dead code, naming or convention drift
         against `CLAUDE.md`, and comments that violate the comment policy. Skip
         anything Biome or TypeScript already catches.
      4. Be specific and terse. Prefer a handful of high-confidence findings over
         a long list of nits.

      ## Output

      Print Markdown ready to post as a PR comment, nothing else. Do NOT write
      any files. Shape:

      ## keelson review

      <one-line verdict: READY TO MERGE | NEEDS NITS | NEEDS FIXES>

      ### Findings

      - **SEVERITY** `path:line` — what is wrong / the fix
        (severity is one of CRITICAL, HIGH, MEDIUM, LOW)

      If there are no substantive findings, say "No blocking issues found." and
      list any nits under a short "Nits" heading.

  # ── Layer 2: post (no AI; DRY_RUN-aware) ──

  - id: post
    depends_on: [review]
    timeout: 60000
    bash: |
      set -euo pipefail
      DRY="${KEELSON_PR_REVIEW_DRY_RUN:-1}"
      MARKER="<!-- keelson-pr-review -->"

      PR_NUM=$(cat "$KEELSON_ARTIFACTS_DIR/.pr-number" 2>/dev/null || true)
      if [ -z "$PR_NUM" ]; then
        echo "ERROR: scope did not record a PR number" >&2
        exit 1
      fi

      BODY="$KEELSON_NODE_review_OUTPUT"$'\n\n'"$MARKER"

      if [ "$DRY" = "1" ]; then
        echo "DRY-RUN would post this review on PR #${PR_NUM}:"
        echo "-----"
        printf '%s\n' "$KEELSON_NODE_review_OUTPUT"
        exit 0
      fi

      printf '%s' "$BODY" | gh pr comment "$PR_NUM" --body-file -
      echo "posted keelson review on PR #${PR_NUM}"
      gh pr view "$PR_NUM" --json url -q '.url'
