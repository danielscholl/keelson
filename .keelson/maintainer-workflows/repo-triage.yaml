# Keelson self-triage, for LOCAL use: keelson maintaining its own repo from the
# maintainer's machine. Run it against your running server (which has a real
# provider) — see README.md. Concept ported from Archon's repo-triage (MIT, see
# NOTICE), rewritten as a self-contained keelson DAG using only supported node
# types.
#
# Determinism split: bash nodes do all the `gh` I/O (gather facts, apply
# results); one AI node does the judgment. The AI's output reaches the apply
# node only through KEELSON_NODE_classify_OUTPUT, never spliced into the shell,
# so an issue body can't inject commands.
#
# Uses only labels the repo already carries (see direction.md); it never creates
# labels and never closes anything. Stale / duplicate / needs-info observations
# go in the comment for the maintainer to act on.
#
# DRY_RUN: KEELSON_TRIAGE_DRY_RUN=1 (the default) prints intended actions without
# touching the repo. Set it to 0 to apply.
#
# Runs headless (`keelson workflow run` with no server) or through a running
# `keelson service` — both register the same provider set.

name: repo-triage
description: |
  Use when: Local maintenance pass over the repo's open issues — label by area
            and type from the existing label set, and surface duplicates, stale
            issues, missing info, and off-direction asks in a comment.
  Triggers: "triage issues", "repo triage", "label the issues".
  Does: Fetches open issues + PRs -> classifies each against direction.md and
        the repo's real labels -> applies an area + type label and posts one
        terse triage comment per issue. Idempotent; never closes.
  NOT for: Closing issues. Fixing bugs. Reviewing a PR.

nodes:
  # ── Layer 0: gather facts in parallel (no AI) ──

  - id: context
    bash: |
      set -euo pipefail
      cat ".keelson/maintainer-workflows/direction.md"

  - id: gather
    bash: |
      set -euo pipefail
      LIMIT="${KEELSON_TRIAGE_LIMIT:-30}"
      STALE_DAYS="${KEELSON_TRIAGE_STALE_DAYS:-30}"

      gh issue list --state open --limit "$LIMIT" \
        --json number,title,body,labels,author,createdAt,updatedAt \
        > "$KEELSON_ARTIFACTS_DIR/issues.json"
      gh pr list --state open --limit 50 --json number,title \
        > "$KEELSON_ARTIFACTS_DIR/prs.json"

      COUNT=$(jq 'length' "$KEELSON_ARTIFACTS_DIR/issues.json")
      echo "gathered ${COUNT} open issue(s); stale threshold ${STALE_DAYS}d" >&2

      jq -n \
        --argjson stale_days "$STALE_DAYS" \
        --slurpfile issues "$KEELSON_ARTIFACTS_DIR/issues.json" \
        --slurpfile prs "$KEELSON_ARTIFACTS_DIR/prs.json" \
        '{
           stale_days: $stale_days,
           open_prs: $prs[0],
           issues: ($issues[0] | map({
             number,
             title,
             body: ((.body // "") | .[0:1200]),
             labels: [.labels[].name],
             author: .author.login,
             age_days: ((now - (.updatedAt | fromdateiso8601)) / 86400 | floor)
           }))
         }'

  # ── Layer 1: classify (the only AI node) ──

  - id: classify
    depends_on: [context, gather]
    idle_timeout: 120000
    prompt: |
      You are the keelson repository triage assistant. Classify every open issue
      using the project's direction and the repository's real label set below.

      ## Project direction and labels

      $context.output

      ## Open issues and context (JSON)

      $gather.output

      ## Decide, per issue

      - `area_label`: the single best area label from the Area table, or null if
        unclear. Use the exact label string (e.g. "packages/workflows").
      - `type_label`: the single best type label (bug | enhancement |
        documentation | question), or null if unclear.
      - `comment`: a terse, neutral 1-3 sentence triage note for the maintainer.
        Fold in, when they apply: a likely duplicate (cite the issue number), a
        stale issue (age_days at or above stale_days), a missing reproduction or
        empty body, or an off-direction ask (cite the direction.md clause). If
        none apply and the labels say it all, keep the comment to one short line.

      ## Output

      Output ONLY a JSON object. No markdown fences, no prose before or after:

      {"issues":[{"number":0,"area_label":null,"type_label":null,"comment":""}]}

  # ── Layer 2: apply (no AI; DRY_RUN-aware; idempotent; existing labels only) ──

  - id: apply
    depends_on: [classify]
    timeout: 120000
    bash: |
      set -uo pipefail
      DRY="${KEELSON_TRIAGE_DRY_RUN:-1}"
      MARKER="<!-- keelson-triage -->"
      AREA_LABELS="apps/cli apps/server apps/web packages/providers packages/shared packages/workflows packages/skills github-actions"
      TYPE_LABELS="bug enhancement documentation question"
      in_set() { case " $1 " in *" $2 "*) return 0 ;; *) return 1 ;; esac }

      JSON=$(printf '%s' "$KEELSON_NODE_classify_OUTPUT" \
        | sed -e 's/^[[:space:]]*```json[[:space:]]*$//' \
              -e 's/^[[:space:]]*```[[:space:]]*$//')

      if ! printf '%s' "$JSON" | jq -e '.issues' >/dev/null 2>&1; then
        echo "ERROR: classify output is not valid JSON with an .issues array" >&2
        printf '%s\n' "$JSON" | head -20 >&2
        exit 1
      fi

      printf '%s' "$JSON" | jq -c '.issues[]' | while read -r row; do
        N=$(printf '%s' "$row" | jq -r '.number')
        [ -z "$N" ] || [ "$N" = "null" ] && continue
        AREA=$(printf '%s' "$row" | jq -r '.area_label // empty')
        TYPE=$(printf '%s' "$row" | jq -r '.type_label // empty')
        COMMENT=$(printf '%s' "$row" | jq -r '.comment // empty')

        ADD=""
        [ -n "$AREA" ] && in_set "$AREA_LABELS" "$AREA" && ADD="$ADD,$AREA"
        [ -n "$TYPE" ] && in_set "$TYPE_LABELS" "$TYPE" && ADD="$ADD,$TYPE"
        ADD="${ADD#,}"

        if [ "$DRY" = "1" ]; then
          echo "DRY-RUN #$N  +labels[${ADD:-none}]"
          printf '%s\n' "$COMMENT" | sed 's/^/         /'
          continue
        fi

        # Keep one area + one type: drop existing area/type labels that aren't
        # the chosen ones, then add. Leaves all other labels untouched.
        CURRENT=$(gh issue view "$N" --json labels --jq '.labels[].name' 2>/dev/null || true)
        REMOVE=""
        while IFS= read -r L; do
          [ -z "$L" ] && continue
          if in_set "$AREA_LABELS" "$L" && [ "$L" != "$AREA" ]; then REMOVE="$REMOVE,$L"; fi
          if in_set "$TYPE_LABELS" "$L" && [ "$L" != "$TYPE" ]; then REMOVE="$REMOVE,$L"; fi
        done <<< "$CURRENT"
        REMOVE="${REMOVE#,}"
        APPLY_OK=1
        if [ -n "$REMOVE" ] && ! gh issue edit "$N" --remove-label "$REMOVE" >/dev/null 2>&1; then
          echo "WARN: failed to remove labels [$REMOVE] from issue $N" >&2
          APPLY_OK=0
        fi
        if [ -n "$ADD" ] && ! gh issue edit "$N" --add-label "$ADD" >/dev/null 2>&1; then
          echo "WARN: failed to add labels [$ADD] to issue $N" >&2
          APPLY_OK=0
        fi

        # Post the triage comment once: skip if our marker is already present.
        if gh issue view "$N" --json comments \
             --jq '.comments[].body' 2>/dev/null | grep -qF "$MARKER"; then
          NOTE="(comment already present)"
        elif printf '%s\n\n%s' "$COMMENT" "$MARKER" | gh issue comment "$N" --body-file - >/dev/null 2>&1; then
          NOTE="+ comment"
        else
          echo "WARN: failed to post triage comment on issue $N" >&2
          APPLY_OK=0
          NOTE="(comment failed)"
        fi
        if [ "$APPLY_OK" = "1" ]; then
          echo "applied #$N  +labels[${ADD:-none}]  $NOTE"
        else
          echo "incomplete #$N  +labels[${ADD:-none}]  $NOTE" >&2
        fi
      done
