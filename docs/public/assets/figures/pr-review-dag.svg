<svg viewBox="0 0 1360 470" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The pr-review DAG, left to right. extract-pr (prompt) feeds scope (bash), which feeds classify (prompt). classify fans out to four read-only review lanes, all gated by a when condition: code-review's gate fires for any code change (solid edge), and error-handling, test-coverage, and docs-impact are selective (dashed edges). All four converge on synthesize (prompt) under a one_success join, which feeds post-comment (bash).">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .slate{ fill:#64748b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#64748b" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- start rail -->
  <line x1="44" y1="70" x2="44" y2="395" stroke="#64748b" stroke-width="1"
        stroke-dasharray="5 5" stroke-opacity="0.55"/>
  <text class="lbl slate" x="44" y="58" font-size="10" text-anchor="middle">start</text>

  <!-- extract-pr -->
  <rect x="70" y="209" width="150" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="145" y="240" font-size="13" text-anchor="middle">extract-pr</text>
  <text class="lbl slate" x="145" y="255" font-size="10" text-anchor="middle">prompt</text>

  <!-- scope -->
  <rect x="280" y="209" width="150" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="355" y="240" font-size="13" text-anchor="middle">scope</text>
  <text class="lbl slate" x="355" y="255" font-size="10" text-anchor="middle">bash</text>

  <!-- classify -->
  <rect x="490" y="209" width="150" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="565" y="237" font-size="13" text-anchor="middle">classify</text>
  <text class="lbl slate" x="565" y="252" font-size="10" text-anchor="middle">prompt · json</text>

  <!-- lane: code-review -->
  <rect x="720" y="70" width="185" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="812" y="99"  font-size="13" text-anchor="middle">code-review</text>
  <text class="lbl slate" x="812" y="113" font-size="10" text-anchor="middle">prompt · read-only</text>

  <!-- lane: error-handling -->
  <rect x="720" y="160" width="185" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="812" y="189" font-size="13" text-anchor="middle">error-handling</text>
  <text class="lbl slate" x="812" y="203" font-size="10" text-anchor="middle">prompt · read-only</text>

  <!-- lane: test-coverage -->
  <rect x="720" y="250" width="185" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="812" y="279" font-size="13" text-anchor="middle">test-coverage</text>
  <text class="lbl slate" x="812" y="293" font-size="10" text-anchor="middle">prompt · read-only</text>

  <!-- lane: docs-impact -->
  <rect x="720" y="340" width="185" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="812" y="369" font-size="13" text-anchor="middle">docs-impact</text>
  <text class="lbl slate" x="812" y="383" font-size="10" text-anchor="middle">prompt · read-only</text>

  <!-- synthesize -->
  <rect x="965" y="209" width="150" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="1040" y="237" font-size="13" text-anchor="middle">synthesize</text>
  <text class="lbl slate" x="1040" y="252" font-size="10" text-anchor="middle">prompt · join</text>

  <!-- post-comment -->
  <rect x="1175" y="209" width="150" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="1250" y="240" font-size="13" text-anchor="middle">post-comment</text>
  <text class="lbl slate" x="1250" y="255" font-size="10" text-anchor="middle">bash</text>

  <!-- spine edges -->
  <line x1="44"  y1="235" x2="66"  y2="235" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="222" y1="235" x2="276" y2="235" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="432" y1="235" x2="486" y2="235" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- classify -> lanes -->
  <path d="M 642 226 C 685 150, 700 105, 716 96"  fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 642 231 C 678 210, 692 190, 716 185" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-slate)"/>
  <path d="M 642 240 C 678 260, 692 274, 716 276" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-slate)"/>
  <path d="M 642 246 C 688 330, 700 358, 716 366" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-slate)"/>

  <!-- lanes -> synthesize -->
  <path d="M 907 96  C 948 145, 955 200, 963 224" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 907 185 C 935 205, 950 222, 963 231" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 907 276 C 935 258, 950 244, 963 240" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 907 366 C 948 320, 955 262, 963 248" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- synthesize -> post -->
  <line x1="1117" y1="235" x2="1171" y2="235" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- join annotation -->
  <text class="lbl slate" x="1040" y="180" font-size="10.5" text-anchor="middle">trigger_rule: one_success</text>

  <!-- legend -->
  <line x1="70" y1="430" x2="104" y2="430" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl navy"  x="112" y="434" font-size="10.5">when: gate fires for any code change</text>
  <line x1="70" y1="450" x2="104" y2="450" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-slate)"/>
  <text class="lbl slate" x="112" y="454" font-size="10.5">when: gate fires only when the lane is relevant</text>
</svg>
