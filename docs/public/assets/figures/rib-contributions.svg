<svg viewBox="0 0 780 360" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="One rib package on the left contributes through four labeled hooks to four harness destinations on the right: the tool registry, snapshot keys under the rib's namespace, the workflow catalog, and the operator probes.">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .brass{ fill:#8a5a1f; }
      .slate{ fill:#64748b; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- the rib (brass = a rib) -->
  <g>
    <rect x="32" y="96" width="200" height="168" rx="5"
          fill="#b5803a" fill-opacity="0.07" stroke="#b5803a" stroke-width="2"/>
    <text class="lbl brass" x="132" y="126" font-size="13" text-anchor="middle">@keelson/rib-example</text>
    <line x1="52" y1="140" x2="212" y2="140" stroke="#b5803a" stroke-width="1" stroke-opacity="0.45"/>
    <text class="lbl slate" x="132" y="162" font-size="10.5" text-anchor="middle">one package, one repo</text>
    <text class="lbl slate" x="132" y="180" font-size="10.5" text-anchor="middle">owns one external system</text>
    <text class="lbl slate" x="132" y="198" font-size="10.5" text-anchor="middle">every hook optional</text>
  </g>

  <!-- destination: tool registry -->
  <g>
    <rect x="492" y="28" width="256" height="58" rx="4"
          fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="1.8"/>
    <text class="lbl navy" x="620" y="52" font-size="12" text-anchor="middle">tool registry</text>
    <text class="lbl slate" x="620" y="70" font-size="10" text-anchor="middle">chat agent + workflow prompt nodes</text>
  </g>

  <!-- destination: snapshot keys -->
  <g>
    <rect x="492" y="108" width="256" height="58" rx="4"
          fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="1.8"/>
    <text class="lbl navy" x="620" y="132" font-size="12" text-anchor="middle">snapshot keys  rib:example:*</text>
    <text class="lbl slate" x="620" y="150" font-size="10" text-anchor="middle">views + surfaces in the browser</text>
  </g>

  <!-- destination: workflow catalog -->
  <g>
    <rect x="492" y="188" width="256" height="58" rx="4"
          fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="1.8"/>
    <text class="lbl navy" x="620" y="212" font-size="12" text-anchor="middle">workflow catalog</text>
    <text class="lbl slate" x="620" y="230" font-size="10" text-anchor="middle">runs can repopulate snapshot keys</text>
  </g>

  <!-- destination: operator probes -->
  <g>
    <rect x="492" y="268" width="256" height="58" rx="4"
          fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="1.8"/>
    <text class="lbl navy" x="620" y="292" font-size="12" text-anchor="middle">actions + auth status</text>
    <text class="lbl slate" x="620" y="310" font-size="10" text-anchor="middle">loopback API, rib list, doctor</text>
  </g>

  <!-- hook arrows -->
  <g stroke="#1e3a5f" stroke-width="1.6" fill="none">
    <path d="M 232 130 C 330 110, 380 70, 488 58" marker-end="url(#arr)"/>
    <path d="M 232 160 C 320 152, 390 142, 488 138" marker-end="url(#arr)"/>
    <path d="M 232 200 C 320 206, 390 214, 488 217" marker-end="url(#arr)"/>
    <path d="M 232 230 C 330 250, 380 290, 488 297" marker-end="url(#arr)"/>
  </g>
  <text class="lbl navy" x="356" y="76" font-size="11" text-anchor="middle">registerTools()</text>
  <text class="lbl navy" x="356" y="136" font-size="11" text-anchor="middle">composeBundle()</text>
  <text class="lbl navy" x="356" y="226" font-size="11" text-anchor="middle">contributeWorkflows()</text>
  <text class="lbl navy" x="356" y="290" font-size="11" text-anchor="middle">onAction / authStatus</text>

  <!-- the boundary -->
  <line x1="462" y1="20" x2="462" y2="340" stroke="#64748b" stroke-width="1"
        stroke-dasharray="6 5" stroke-opacity="0.6"/>
  <text class="lbl slate" x="462" y="352" font-size="10" text-anchor="middle">the harness boundary: keys and credentials stay under rib:example</text>
</svg>
