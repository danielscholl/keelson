<svg viewBox="0 0 740 260" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Workflow run states. A run starts running, may pause at an approval node and resume, and ends succeeded, failed, or cancelled. A dashed edge shows that a paused run is marked failed if the server restarts.">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .blue { fill:#2f6fb0; }
      .green{ fill:#2f8f5b; }
      .slate{ fill:#64748b; }
    </style>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrS" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#64748b" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- start rail -->
  <line x1="48" y1="40" x2="48" y2="120" stroke="#64748b" stroke-width="1"
        stroke-dasharray="5 5" stroke-opacity="0.55"/>
  <text class="lbl slate" x="48" y="28" font-size="10" text-anchor="middle">start</text>
  <line x1="48" y1="80" x2="112" y2="80" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arr2)"/>

  <!-- running -->
  <rect x="116" y="57" width="146" height="46" rx="23"
        fill="#2f6fb0" fill-opacity="0.07" stroke="#2f6fb0" stroke-width="2"/>
  <text class="lbl navy" x="189" y="85" font-size="13" text-anchor="middle">running</text>

  <!-- paused -->
  <rect x="116" y="180" width="146" height="46" rx="23"
        fill="#2f6fb0" fill-opacity="0.07" stroke="#2f6fb0" stroke-width="2" stroke-dasharray="0"/>
  <text class="lbl navy" x="189" y="208" font-size="13" text-anchor="middle">paused</text>

  <!-- running <-> paused -->
  <line x1="165" y1="103" x2="165" y2="176" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arr2)"/>
  <text class="lbl slate" x="155" y="144" font-size="10" text-anchor="end">approval node</text>
  <line x1="213" y1="180" x2="213" y2="107" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arr2)"/>
  <text class="lbl slate" x="223" y="144" font-size="10">resume</text>

  <!-- terminals -->
  <rect x="520" y="24" width="170" height="44" rx="22"
        fill="#2f8f5b" fill-opacity="0.07" stroke="#2f8f5b" stroke-width="2"/>
  <text class="lbl green" x="605" y="51" font-size="13" text-anchor="middle">succeeded</text>

  <rect x="520" y="106" width="170" height="44" rx="22"
        fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="2"/>
  <text class="lbl navy" x="605" y="133" font-size="13" text-anchor="middle">failed</text>

  <rect x="520" y="188" width="170" height="44" rx="22"
        fill="#64748b" fill-opacity="0.06" stroke="#64748b" stroke-width="2"/>
  <text class="lbl slate" x="605" y="215" font-size="13" text-anchor="middle">cancelled</text>

  <!-- running -> terminals -->
  <g stroke="#1e3a5f" stroke-width="1.6" fill="none">
    <path d="M 262 70 C 360 58, 420 50, 516 47" marker-end="url(#arr2)"/>
    <path d="M 262 88 C 360 98, 420 116, 516 126" marker-end="url(#arr2)"/>
    <path d="M 262 98 C 380 130, 430 180, 516 203" marker-end="url(#arr2)"/>
  </g>
  <text class="lbl slate" x="388" y="44" font-size="10" text-anchor="middle">every node terminal, none failed</text>
  <text class="lbl slate" x="384" y="93" font-size="10" text-anchor="middle">a failure no rule rescued</text>
  <text class="lbl slate" x="335" y="172" font-size="10" text-anchor="middle">cancel node or operator</text>

  <!-- paused -> failed on restart -->
  <path d="M 262 212 C 390 234, 460 186, 516 142" fill="none"
        stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#arrS)"/>
  <text class="lbl slate" x="392" y="250" font-size="10" text-anchor="middle">server restart: boot reconcile marks it failed</text>
</svg>
