<svg viewBox="0 0 780 240" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The snapshot pipeline. A rib composer or workflow run output passes a fail-closed validate gate into the snapshot manager's cache, which broadcasts a snapshot_update frame over WebSocket to the browser canvas. A dashed edge shows late joiners fetching the latest frame over HTTP.">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .blue { fill:#2f6fb0; }
      .brass{ fill:#8a5a1f; }
      .slate{ fill:#64748b; }
    </style>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr3s" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#64748b" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- producers (brass = rib side) -->
  <g>
    <rect x="24" y="78" width="184" height="84" rx="5"
          fill="#b5803a" fill-opacity="0.07" stroke="#b5803a" stroke-width="2"/>
    <text class="lbl brass" x="116" y="106" font-size="12" text-anchor="middle">composeBundle()</text>
    <text class="lbl brass" x="116" y="126" font-size="12" text-anchor="middle">workflow run output</text>
    <text class="lbl slate" x="116" y="148" font-size="10" text-anchor="middle">data under rib:&lt;id&gt;:*</text>
  </g>

  <line x1="208" y1="120" x2="248" y2="120" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arr3)"/>

  <!-- validate gate -->
  <g>
    <rect x="252" y="96" width="118" height="48" rx="4"
          fill="#ffffff" stroke="#64748b" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text class="lbl slate" x="311" y="116" font-size="11" text-anchor="middle">validate</text>
    <text class="lbl slate" x="311" y="132" font-size="10" text-anchor="middle">fail closed</text>
  </g>

  <line x1="370" y1="120" x2="410" y2="120" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arr3)"/>

  <!-- snapshot manager -->
  <g>
    <rect x="414" y="84" width="164" height="72" rx="5"
          fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="2"/>
    <text class="lbl navy" x="496" y="112" font-size="12" text-anchor="middle">snapshot manager</text>
    <text class="lbl slate" x="496" y="132" font-size="10" text-anchor="middle">cache + version n</text>
  </g>

  <line x1="578" y1="120" x2="618" y2="120" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arr3)"/>
  <text class="lbl slate" x="598" y="106" font-size="10" text-anchor="middle">WS</text>

  <!-- browser -->
  <g>
    <rect x="622" y="84" width="140" height="72" rx="5"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="2"/>
    <text class="lbl navy" x="692" y="112" font-size="12" text-anchor="middle">browser canvas</text>
    <text class="lbl slate" x="692" y="132" font-size="10" text-anchor="middle">board · table · graph</text>
  </g>

  <!-- frame label above -->
  <text class="lbl navy" x="496" y="56" font-size="11" text-anchor="middle">{ key, version, composedAt, data }</text>
  <line x1="496" y1="64" x2="496" y2="80" stroke="#1e3a5f" stroke-width="1" stroke-opacity="0.5"/>

  <!-- late join -->
  <path d="M 496 156 C 520 196, 620 200, 686 160" fill="none"
        stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#arr3s)"/>
  <text class="lbl slate" x="590" y="212" font-size="10" text-anchor="middle">late join: GET latest, then subscribe</text>

  <!-- drop note -->
  <text class="lbl slate" x="311" y="170" font-size="10" text-anchor="middle">a bad payload is dropped;</text>
  <text class="lbl slate" x="311" y="184" font-size="10" text-anchor="middle">the prior frame survives</text>
</svg>
