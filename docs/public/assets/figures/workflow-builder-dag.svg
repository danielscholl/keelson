<svg viewBox="0 0 1300 200" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The workflow-builder pipeline, left to right: scan-codebase (bash), extract-intent (prompt, typed JSON), generate-yaml (prompt, Read and Write), validate-yaml (bash, a parse gate that stops the run on a bad file), save-or-report (prompt, installs the workflow).">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .slate{ fill:#64748b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <line x1="22" y1="52" x2="22" y2="142" stroke="#64748b" stroke-width="1" stroke-dasharray="5 5" stroke-opacity="0.55"/>
  <text class="lbl slate" x="22" y="42" font-size="10" text-anchor="middle">start</text>

  <rect x="40" y="68" width="180" height="56" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="130" y="98"  font-size="13" text-anchor="middle">scan-codebase</text>
  <text class="lbl slate" x="130" y="113" font-size="10" text-anchor="middle">bash</text>

  <rect x="295" y="68" width="180" height="56" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="385" y="98"  font-size="13" text-anchor="middle">extract-intent</text>
  <text class="lbl slate" x="385" y="113" font-size="10" text-anchor="middle">prompt · json</text>

  <rect x="550" y="68" width="180" height="56" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="640" y="98"  font-size="13" text-anchor="middle">generate-yaml</text>
  <text class="lbl slate" x="640" y="113" font-size="10" text-anchor="middle">prompt · Read·Write</text>

  <rect x="805" y="68" width="180" height="56" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="895" y="98"  font-size="13" text-anchor="middle">validate-yaml</text>
  <text class="lbl slate" x="895" y="113" font-size="10" text-anchor="middle">bash · parse gate</text>

  <rect x="1060" y="68" width="180" height="56" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="1150" y="98"  font-size="13" text-anchor="middle">save-or-report</text>
  <text class="lbl slate" x="1150" y="113" font-size="10" text-anchor="middle">prompt · installs</text>

  <line x1="22"  y1="96" x2="38"  y2="96" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="220" y1="96" x2="293" y2="96" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="475" y1="96" x2="548" y2="96" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="730" y1="96" x2="803" y2="96" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="985" y1="96" x2="1058" y2="96" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl slate" x="1021" y="88" font-size="10" text-anchor="middle">valid</text>

  <text class="lbl slate" x="895" y="150" font-size="10.5" text-anchor="middle">parse fails → run stops, no install</text>
</svg>
