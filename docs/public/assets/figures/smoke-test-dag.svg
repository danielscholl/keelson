<svg viewBox="0 0 1040 490" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The smoke-test DAG. Roots prompt-node, bash-json-node, and script-bun-node feed the merge join; prompt-node goes via downstream (env channel) and bash-json-node via gated (a when condition). merge joins downstream, gated, and script-bun-node under all_success. assert joins merge, loop-node, and command-node under all_success and checks every node produced output.">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .slate{ fill:#64748b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="lbl slate" x="130" y="38" font-size="10.5" text-anchor="middle">five roots = five node kinds</text>

  <!-- roots -->
  <rect x="40" y="60" width="180" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="130" y="86"  font-size="13" text-anchor="middle">prompt-node</text>
  <text class="lbl slate" x="130" y="100" font-size="10" text-anchor="middle">prompt</text>

  <rect x="40" y="180" width="180" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="130" y="206" font-size="13" text-anchor="middle">bash-json-node</text>
  <text class="lbl slate" x="130" y="220" font-size="10" text-anchor="middle">bash · json</text>

  <rect x="40" y="300" width="180" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="130" y="326" font-size="13" text-anchor="middle">script-bun-node</text>
  <text class="lbl slate" x="130" y="340" font-size="10" text-anchor="middle">script · bun</text>

  <!-- middle -->
  <rect x="300" y="60" width="170" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="385" y="86"  font-size="13" text-anchor="middle">downstream</text>
  <text class="lbl slate" x="385" y="100" font-size="10" text-anchor="middle">bash</text>

  <rect x="300" y="180" width="170" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="385" y="206" font-size="13" text-anchor="middle">gated</text>
  <text class="lbl slate" x="385" y="220" font-size="10" text-anchor="middle">bash · when</text>

  <!-- merge -->
  <rect x="540" y="168" width="160" height="54" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="620" y="194" font-size="13" text-anchor="middle">merge</text>
  <text class="lbl slate" x="620" y="209" font-size="10" text-anchor="middle">bash · all_success</text>

  <!-- assert roots -->
  <rect x="540" y="300" width="160" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="620" y="326" font-size="13" text-anchor="middle">loop-node</text>
  <text class="lbl slate" x="620" y="340" font-size="10" text-anchor="middle">loop</text>

  <rect x="540" y="390" width="160" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="620" y="416" font-size="13" text-anchor="middle">command-node</text>
  <text class="lbl slate" x="620" y="430" font-size="10" text-anchor="middle">command</text>

  <!-- assert -->
  <rect x="800" y="246" width="190" height="58" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="895" y="273" font-size="13" text-anchor="middle">assert</text>
  <text class="lbl slate" x="895" y="288" font-size="10" text-anchor="middle">bash · checks every output</text>

  <!-- edges -->
  <line x1="220" y1="85" x2="298" y2="85" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl slate" x="259" y="77" font-size="9.5" text-anchor="middle">env channel</text>

  <line x1="220" y1="205" x2="298" y2="205" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-slate)"/>
  <text class="lbl slate" x="259" y="197" font-size="9.5" text-anchor="middle">when:</text>

  <path d="M 470 85  C 510 85, 515 160, 538 178" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 470 205 C 505 205, 515 198, 538 196" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 220 322 C 400 322, 470 230, 538 212" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <path d="M 700 198 C 745 205, 760 250, 798 262" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 700 320 C 745 312, 765 295, 798 284" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 700 410 C 760 402, 768 320, 800 300" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <text class="lbl slate" x="895" y="330" font-size="10" text-anchor="middle">trigger_rule: all_success</text>
</svg>
