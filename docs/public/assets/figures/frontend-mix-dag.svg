<svg viewBox="0 0 880 336" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The frontend-mix DAG, drawn as two rows. Row one runs left to right: explore, plan, build-ui, integrate, validate. A drop edge carries the flow down to row two, which runs right to left: fix-validation, smoke, approve-deploy, deploy, finalize. Each node names its model class; approve-deploy is a brass human approval gate; finalize is a bash commit node. A dashed note says every edge hands off a markdown artifact.">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .slate{ fill:#64748b; }
      .brass{ fill:#8a5a1f; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- row 1, left to right -->
  <g>
    <rect x="36" y="44" width="128" height="46" rx="4"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
    <text class="lbl navy" x="100" y="64" font-size="12.5" text-anchor="middle">explore</text>
    <text class="lbl slate" x="100" y="80" font-size="10" text-anchor="middle">prompt · fast</text>
  </g>
  <g>
    <rect x="206" y="44" width="128" height="46" rx="4"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
    <text class="lbl navy" x="270" y="64" font-size="12.5" text-anchor="middle">plan</text>
    <text class="lbl slate" x="270" y="80" font-size="10" text-anchor="middle">prompt · strong</text>
  </g>
  <g>
    <rect x="376" y="44" width="128" height="46" rx="4"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
    <text class="lbl navy" x="440" y="64" font-size="12.5" text-anchor="middle">build-ui</text>
    <text class="lbl slate" x="440" y="80" font-size="10" text-anchor="middle">prompt · ui-strong</text>
  </g>
  <g>
    <rect x="546" y="44" width="128" height="46" rx="4"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
    <text class="lbl navy" x="610" y="64" font-size="12.5" text-anchor="middle">integrate</text>
    <text class="lbl slate" x="610" y="80" font-size="10" text-anchor="middle">prompt · strong</text>
  </g>
  <g>
    <rect x="716" y="44" width="128" height="46" rx="4"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
    <text class="lbl navy" x="780" y="64" font-size="12.5" text-anchor="middle">validate</text>
    <text class="lbl slate" x="780" y="80" font-size="10" text-anchor="middle">prompt · fast</text>
  </g>

  <!-- row 1 edges -->
  <line x1="168" y1="67" x2="202" y2="67" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="338" y1="67" x2="372" y2="67" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="508" y1="67" x2="542" y2="67" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="678" y1="67" x2="712" y2="67" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- drop edge into row 2 -->
  <line x1="780" y1="92" x2="780" y2="200" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- row 2, right to left -->
  <g>
    <rect x="716" y="204" width="128" height="46" rx="4"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
    <text class="lbl navy" x="780" y="224" font-size="12.5" text-anchor="middle">fix-validation</text>
    <text class="lbl slate" x="780" y="240" font-size="10" text-anchor="middle">prompt · strong</text>
  </g>
  <g>
    <rect x="546" y="204" width="128" height="46" rx="4"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
    <text class="lbl navy" x="610" y="224" font-size="12.5" text-anchor="middle">smoke</text>
    <text class="lbl slate" x="610" y="240" font-size="10" text-anchor="middle">prompt · fast</text>
  </g>
  <g>
    <rect x="376" y="204" width="128" height="46" rx="4"
          fill="#b5803a" fill-opacity="0.06" stroke="#b5803a" stroke-width="1.8"/>
    <text class="lbl navy" x="440" y="224" font-size="12.5" text-anchor="middle">approve-deploy</text>
    <text class="lbl brass" x="440" y="240" font-size="10" text-anchor="middle">approval · you</text>
  </g>
  <g>
    <rect x="206" y="204" width="128" height="46" rx="4"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
    <text class="lbl navy" x="270" y="224" font-size="12.5" text-anchor="middle">deploy</text>
    <text class="lbl slate" x="270" y="240" font-size="10" text-anchor="middle">prompt · strong</text>
  </g>
  <g>
    <rect x="36" y="204" width="128" height="46" rx="4"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
    <text class="lbl navy" x="100" y="224" font-size="12.5" text-anchor="middle">finalize</text>
    <text class="lbl slate" x="100" y="240" font-size="10" text-anchor="middle">bash · commit</text>
  </g>

  <!-- row 2 edges (flow runs right to left) -->
  <line x1="712" y1="227" x2="678" y2="227" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="542" y1="227" x2="508" y2="227" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="372" y1="227" x2="338" y2="227" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="202" y1="227" x2="168" y2="227" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- artifact handoff note -->
  <g>
    <rect x="186" y="292" width="508" height="22" rx="3"
          fill="#ffffff" stroke="#64748b" stroke-width="1" stroke-dasharray="4 4"/>
    <text class="lbl slate" x="440" y="307" font-size="10.5" text-anchor="middle">every edge hands off a markdown artifact written to $ARTIFACTS_DIR</text>
  </g>
</svg>
