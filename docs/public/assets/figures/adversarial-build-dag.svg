<svg viewBox="0 0 770 560" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The adversarial-build state machine. plan (prompt) feeds init-workspace (bash), which enters a loop cluster of three roles: Negotiator (negotiating), Generator (building), Evaluator (evaluating). Negotiator sets criteria for the Generator, the Generator builds for the Evaluator, the Evaluator either bounces a fail back to the Generator with feedback or passes to the next sprint's Negotiator. When the state file reaches complete or failed, the loop exits to report.">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .slate{ fill:#64748b; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- plan / init -->
  <rect x="40" y="70" width="190" height="54" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="135" y="98"  font-size="13" text-anchor="middle">plan</text>
  <text class="lbl slate" x="135" y="113" font-size="10" text-anchor="middle">prompt · spec + sprints</text>

  <rect x="40" y="180" width="190" height="54" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="135" y="208" font-size="13" text-anchor="middle">init-workspace</text>
  <text class="lbl slate" x="135" y="223" font-size="10" text-anchor="middle">bash · seeds state.json</text>

  <line x1="135" y1="124" x2="135" y2="180" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- loop cluster -->
  <rect x="290" y="68" width="440" height="332" rx="12" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="7 5" stroke-opacity="0.7"/>
  <text class="lbl slate" x="310" y="90" font-size="10.5">adversarial-sprint · loop · fresh context per role</text>

  <rect x="430" y="118" width="170" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="515" y="144" font-size="13" text-anchor="middle">Negotiator</text>
  <text class="lbl slate" x="515" y="158" font-size="10" text-anchor="middle">phase: negotiating</text>

  <rect x="320" y="278" width="170" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="405" y="304" font-size="13" text-anchor="middle">Generator</text>
  <text class="lbl slate" x="405" y="318" font-size="10" text-anchor="middle">phase: building</text>

  <rect x="540" y="278" width="170" height="50" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="625" y="304" font-size="13" text-anchor="middle">Evaluator</text>
  <text class="lbl slate" x="625" y="318" font-size="10" text-anchor="middle">phase: evaluating</text>

  <!-- entry -->
  <path d="M 230 200 C 320 188, 360 150, 426 142" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Negotiator -> Generator -->
  <path d="M 480 168 C 440 205, 415 240, 407 274" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl slate" x="402" y="228" font-size="10" text-anchor="end">criteria</text>

  <!-- Generator -> Evaluator -->
  <line x1="490" y1="303" x2="538" y2="303" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl slate" x="514" y="295" font-size="10" text-anchor="middle">build</text>

  <!-- Evaluator -> Generator (fail) -->
  <path d="M 560 280 C 540 250, 480 250, 468 276" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-slate)"/>
  <text class="lbl slate" x="514" y="246" font-size="10" text-anchor="middle">fail → retry</text>

  <!-- Evaluator -> Negotiator (pass) -->
  <path d="M 625 278 C 668 235, 645 188, 600 166" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl slate" x="672" y="226" font-size="10" text-anchor="start">pass →</text>
  <text class="lbl slate" x="672" y="240" font-size="10" text-anchor="start">next sprint</text>

  <!-- exit -->
  <rect x="540" y="448" width="170" height="54" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="625" y="476" font-size="13" text-anchor="middle">report</text>
  <text class="lbl slate" x="625" y="491" font-size="10" text-anchor="middle">all_done · how to run it</text>

  <path d="M 625 328 C 625 380, 625 410, 625 446" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl slate" x="635" y="392" font-size="10" text-anchor="start">complete / failed</text>
</svg>
