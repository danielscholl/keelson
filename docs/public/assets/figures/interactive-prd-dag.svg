<svg viewBox="0 0 600 870" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The interactive-prd conversation, top to bottom, alternating prompt nodes and brass approval gates: initiate, foundation-gate, research, deepdive-gate, technical, scope-gate, generate, validate. Each gate captures the user's answers, which feed the following prompt.">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .slate{ fill:#64748b; }
      .brass{ fill:#8a5a1f; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="lbl slate" x="290" y="32" font-size="11" text-anchor="middle">interactive: true · three human gates</text>

  <!-- initiate -->
  <rect x="140" y="50" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="290" y="80" font-size="14" text-anchor="middle">initiate</text>
  <text class="lbl slate" x="290" y="95" font-size="10" text-anchor="middle">prompt · asks foundation questions</text>

  <!-- foundation-gate -->
  <rect x="140" y="150" width="300" height="52" rx="4" fill="#b5803a" fill-opacity="0.09" stroke="#b5803a" stroke-width="2"/>
  <text class="lbl brass" x="290" y="180" font-size="14" text-anchor="middle">foundation-gate</text>
  <text class="lbl slate" x="290" y="195" font-size="10" text-anchor="middle">approval · capture_response</text>

  <!-- research -->
  <rect x="140" y="250" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="290" y="280" font-size="14" text-anchor="middle">research</text>
  <text class="lbl slate" x="290" y="295" font-size="10" text-anchor="middle">prompt · market + codebase</text>

  <!-- deepdive-gate -->
  <rect x="140" y="350" width="300" height="52" rx="4" fill="#b5803a" fill-opacity="0.09" stroke="#b5803a" stroke-width="2"/>
  <text class="lbl brass" x="290" y="380" font-size="14" text-anchor="middle">deepdive-gate</text>
  <text class="lbl slate" x="290" y="395" font-size="10" text-anchor="middle">approval · capture_response</text>

  <!-- technical -->
  <rect x="140" y="450" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="290" y="480" font-size="14" text-anchor="middle">technical</text>
  <text class="lbl slate" x="290" y="495" font-size="10" text-anchor="middle">prompt · read-only · cites file:line</text>

  <!-- scope-gate -->
  <rect x="140" y="550" width="300" height="52" rx="4" fill="#b5803a" fill-opacity="0.09" stroke="#b5803a" stroke-width="2"/>
  <text class="lbl brass" x="290" y="580" font-size="14" text-anchor="middle">scope-gate</text>
  <text class="lbl slate" x="290" y="595" font-size="10" text-anchor="middle">approval · capture_response</text>

  <!-- generate -->
  <rect x="140" y="650" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="290" y="680" font-size="14" text-anchor="middle">generate</text>
  <text class="lbl slate" x="290" y="695" font-size="10" text-anchor="middle">prompt · writes the PRD</text>

  <!-- validate -->
  <rect x="140" y="750" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="290" y="780" font-size="14" text-anchor="middle">validate</text>
  <text class="lbl slate" x="290" y="795" font-size="10" text-anchor="middle">prompt · checks every claim vs code</text>

  <!-- arrows -->
  <line x1="290" y1="102" x2="290" y2="150" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="290" y1="202" x2="290" y2="250" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="290" y1="302" x2="290" y2="350" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="290" y1="402" x2="290" y2="450" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="290" y1="502" x2="290" y2="550" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="290" y1="602" x2="290" y2="650" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="290" y1="702" x2="290" y2="750" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- mechanism note -->
  <path d="M 446 176 C 470 176, 470 250, 452 274" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text class="lbl slate" x="460" y="172" font-size="10">your reply</text>
  <text class="lbl slate" x="460" y="186" font-size="10">feeds the</text>
  <text class="lbl slate" x="460" y="200" font-size="10">next prompt</text>
</svg>
