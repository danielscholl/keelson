<svg viewBox="0 0 820 990" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The plan-act-evaluate DAG, top to bottom. intake, then plan under a read-only boundary, then publish-plan records the plan as a GitHub issue. A brass approval gate follows; its reply feeds select-mode, which branches into a local arm (act-local, an evaluate loop, open-pr, inside a dashed isolated-worktree frame) and a delegate arm (act-delegate, await-copilot). Both arms converge on ci-signals under a one_success join. A delegate-only review box hangs off ci-signals, and both ci-signals and that review feed the final deterministic report.">
  <defs>
    <style>
      .lbl   { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy  { fill:#1e3a5f; }
      .slate { fill:#64748b; }
      .brass { fill:#8a5a1f; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== PLAN (single column) ===== -->
  <rect x="270" y="56" width="300" height="46" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="420" y="80" font-size="14" text-anchor="middle">intake</text>
  <text class="lbl slate" x="420" y="94" font-size="10" text-anchor="middle">classify request · detect default branch</text>

  <rect x="270" y="132" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="420" y="157" font-size="14" text-anchor="middle">plan</text>
  <text class="lbl slate" x="420" y="173" font-size="10" text-anchor="middle">read-only: Read · Glob · Grep</text>
  <text class="lbl slate" x="40" y="150" font-size="10">capability boundary</text>
  <text class="lbl slate" x="40" y="164" font-size="10">no write, no shell</text>

  <rect x="270" y="214" width="300" height="46" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="420" y="238" font-size="14" text-anchor="middle">publish-plan</text>
  <text class="lbl slate" x="420" y="252" font-size="10" text-anchor="middle">records the plan as a GitHub issue</text>
  <text class="lbl slate" x="592" y="240" font-size="10">system of</text>
  <text class="lbl slate" x="592" y="254" font-size="10">record</text>

  <!-- ===== GATE (brass) ===== -->
  <rect x="270" y="288" width="300" height="56" rx="4" fill="#b5803a" fill-opacity="0.09" stroke="#b5803a" stroke-width="2"/>
  <text class="lbl brass" x="420" y="314" font-size="14" text-anchor="middle">approve-plan</text>
  <text class="lbl slate" x="420" y="330" font-size="10" text-anchor="middle">human gate · the reply picks the path</text>

  <!-- select-mode (branch point) -->
  <rect x="295" y="374" width="250" height="48" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="420" y="399" font-size="13" text-anchor="middle">select-mode</text>
  <text class="lbl slate" x="420" y="414" font-size="10" text-anchor="middle">reply → local | delegate</text>

  <!-- spine arrows -->
  <line x1="420" y1="102" x2="420" y2="132" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="420" y1="184" x2="420" y2="214" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="420" y1="260" x2="420" y2="288" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="420" y1="344" x2="420" y2="374" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- branch arrows -->
  <path d="M 380 420 C 320 446, 250 452, 210 474" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl navy" x="262" y="450" font-size="11" text-anchor="middle">local</text>
  <path d="M 460 420 C 540 446, 600 452, 635 474" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl navy" x="572" y="450" font-size="11" text-anchor="middle">delegate</text>

  <!-- ===== LOCAL arm (isolated worktree frame) ===== -->
  <rect x="40" y="456" width="340" height="236" rx="10" fill="none" stroke="#64748b" stroke-width="1.2" stroke-dasharray="7 5" stroke-opacity="0.7"/>
  <text class="lbl slate" x="58" y="476" font-size="10.5">local · isolated worktree</text>

  <rect x="90" y="486" width="230" height="46" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="205" y="510" font-size="13" text-anchor="middle">act-local</text>
  <text class="lbl slate" x="205" y="524" font-size="10" text-anchor="middle">implement on a branch</text>

  <rect x="90" y="558" width="230" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="205" y="583" font-size="13" text-anchor="middle">evaluate</text>
  <text class="lbl slate" x="205" y="599" font-size="10" text-anchor="middle">loop ≤5 · review &amp; fix</text>

  <rect x="90" y="636" width="230" height="46" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="205" y="660" font-size="13" text-anchor="middle">open-pr</text>
  <text class="lbl slate" x="205" y="674" font-size="10" text-anchor="middle">push · draft PR</text>

  <line x1="205" y1="532" x2="205" y2="558" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="205" y1="610" x2="205" y2="636" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ===== DELEGATE arm ===== -->
  <text class="lbl slate" x="635" y="476" font-size="10.5" text-anchor="middle">delegate · runs on GitHub</text>

  <rect x="510" y="486" width="250" height="46" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="635" y="510" font-size="13" text-anchor="middle">act-delegate</text>
  <text class="lbl slate" x="635" y="524" font-size="10" text-anchor="middle">assign issue to Copilot</text>

  <rect x="510" y="558" width="250" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="635" y="583" font-size="13" text-anchor="middle">await-copilot</text>
  <text class="lbl slate" x="635" y="599" font-size="10" text-anchor="middle">poll until Copilot opens a PR</text>

  <line x1="635" y1="532" x2="635" y2="558" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ===== reconverge: ci-signals ===== -->
  <rect x="290" y="722" width="260" height="56" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="420" y="748" font-size="14" text-anchor="middle">ci-signals</text>
  <text class="lbl slate" x="420" y="764" font-size="10" text-anchor="middle">gh pr checks · authoritative CI</text>

  <path d="M 205 682 C 205 706, 300 716, 352 722" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 635 610 C 635 680, 540 712, 486 722" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl slate" x="556" y="712" font-size="10">trigger_rule: one_success</text>

  <!-- ===== delegate review tail ===== -->
  <rect x="505" y="812" width="270" height="54" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="640" y="838" font-size="13" text-anchor="middle">review Copilot's PR</text>
  <text class="lbl slate" x="640" y="854" font-size="10" text-anchor="middle">capture-diff · self-review · pr-review</text>

  <path d="M 500 778 C 580 792, 610 798, 640 810" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text class="lbl navy" x="600" y="800" font-size="11" text-anchor="middle">delegate</text>

  <!-- ===== report ===== -->
  <rect x="290" y="908" width="260" height="54" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="420" y="934" font-size="14" text-anchor="middle">report</text>
  <text class="lbl slate" x="420" y="950" font-size="10" text-anchor="middle">deterministic · 6-element audit trail</text>

  <path d="M 405 778 C 392 830, 388 870, 392 906" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 640 866 C 640 888, 540 902, 480 910" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
</svg>
