<svg viewBox="0 0 660 990" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The fix-issue pipeline, top to bottom, enclosed in a dashed frame labeled isolated git worktree. fetch and classify forks to investigate (when bug) and plan (when not bug); both feed plan-ready. plan-ready feeds the approval gate, shown in brass, which pauses the run. Then implement, then a validate-fix-revalidate self-correction box with a hard gate, then create-pr, then the review loop, then post-fix-validate, then a CI gate and mark-ready box (await-ci, triage-ci, fix-ci, finalize-pr) that promotes the draft only on green CI, then report.">
  <defs>
    <style>
      .lbl   { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy  { fill:#1e3a5f; }
      .slate { fill:#64748b; }
      .brass { fill:#8a5a1f; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- isolated worktree frame -->
  <rect x="30" y="30" width="600" height="930" rx="12" fill="none" stroke="#64748b"
        stroke-width="1.2" stroke-dasharray="7 5" stroke-opacity="0.7"/>
  <text class="lbl slate" x="52" y="54" font-size="11">isolated git worktree · worktree.enabled</text>

  <!-- 1. fetch & classify -->
  <rect x="180" y="78" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="330" y="104" font-size="14" text-anchor="middle">fetch &amp; classify</text>
  <text class="lbl slate" x="330" y="120" font-size="10" text-anchor="middle">extract-issue · fetch-issue · classify</text>

  <!-- fork arrows -->
  <path d="M 320 132 C 300 150, 280 156, 256 168" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 340 132 C 360 150, 380 156, 404 168" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 2a investigate / 2b plan -->
  <rect x="180" y="170" width="140" height="46" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="250" y="194" font-size="13" text-anchor="middle">investigate</text>
  <text class="lbl slate" x="250" y="208" font-size="10" text-anchor="middle">when: bug</text>

  <rect x="340" y="170" width="140" height="46" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="410" y="194" font-size="13" text-anchor="middle">plan</text>
  <text class="lbl slate" x="410" y="208" font-size="10" text-anchor="middle">when: not bug</text>

  <!-- converge arrows -->
  <path d="M 250 216 C 250 232, 280 238, 306 246" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 410 216 C 410 232, 380 238, 354 246" fill="none" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 2c plan-ready -->
  <rect x="180" y="246" width="300" height="46" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="330" y="270" font-size="13" text-anchor="middle">plan-ready</text>
  <text class="lbl slate" x="330" y="284" font-size="10" text-anchor="middle">funnel · trigger_rule: one_success</text>

  <line x1="330" y1="292" x2="330" y2="318" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 3. approve-plan (brass human gate) -->
  <rect x="180" y="320" width="300" height="54" rx="4" fill="#b5803a" fill-opacity="0.09" stroke="#b5803a" stroke-width="2"/>
  <text class="lbl brass" x="330" y="346" font-size="14" text-anchor="middle">approve-plan</text>
  <text class="lbl slate" x="330" y="362" font-size="10" text-anchor="middle">human gate · capture_response</text>
  <text class="lbl slate" x="498" y="344" font-size="10">pauses until you</text>
  <text class="lbl slate" x="498" y="358" font-size="10">approve or revise</text>

  <line x1="330" y1="374" x2="330" y2="400" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 4. implement -->
  <rect x="180" y="402" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="330" y="428" font-size="14" text-anchor="middle">implement</text>
  <text class="lbl slate" x="330" y="444" font-size="10" text-anchor="middle">writes verify.sh · commits per task</text>
  <text class="lbl slate" x="498" y="424" font-size="10">discovers this</text>
  <text class="lbl slate" x="498" y="438" font-size="10">repo's own checks</text>

  <line x1="330" y1="454" x2="330" y2="480" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 5. self-correction -->
  <rect x="180" y="482" width="300" height="56" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="330" y="507" font-size="13" text-anchor="middle">validate · fix · revalidate</text>
  <text class="lbl slate" x="330" y="523" font-size="10" text-anchor="middle">self-correct → hard gate ✗ skips the PR</text>

  <line x1="330" y1="538" x2="330" y2="564" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 6. create-pr -->
  <rect x="180" y="566" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="330" y="592" font-size="14" text-anchor="middle">create-pr</text>
  <text class="lbl slate" x="330" y="608" font-size="10" text-anchor="middle">push · draft PR · Fixes #N</text>

  <line x1="330" y1="618" x2="330" y2="644" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 7. review loop -->
  <rect x="180" y="646" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="330" y="672" font-size="13" text-anchor="middle">review loop</text>
  <text class="lbl slate" x="330" y="688" font-size="10" text-anchor="middle">panel → triage → fix → re-review</text>

  <line x1="330" y1="698" x2="330" y2="724" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 8. post-fix-validate -->
  <rect x="180" y="726" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="330" y="752" font-size="13" text-anchor="middle">post-fix-validate</text>
  <text class="lbl slate" x="330" y="768" font-size="10" text-anchor="middle">re-check after the loop · exits 0</text>

  <line x1="330" y1="778" x2="330" y2="804" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 9. CI gate / mark ready -->
  <rect x="180" y="806" width="300" height="54" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="330" y="832" font-size="13" text-anchor="middle">CI gate · mark ready</text>
  <text class="lbl slate" x="330" y="848" font-size="10" text-anchor="middle">await-ci · triage-ci · fix-ci · finalize-pr</text>
  <text class="lbl slate" x="498" y="824" font-size="10">green → ready</text>
  <text class="lbl slate" x="498" y="838" font-size="10">red → stays draft</text>

  <line x1="330" y1="860" x2="330" y2="886" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 10. report -->
  <rect x="180" y="888" width="300" height="52" rx="4" fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="1.8"/>
  <text class="lbl navy"  x="330" y="914" font-size="14" text-anchor="middle">report</text>
  <text class="lbl slate" x="330" y="930" font-size="10" text-anchor="middle">operator summary</text>
</svg>
