<svg viewBox="0 0 790 280" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="The memory lifecycle. A workflow writeback passes a fail-closed guardrails gate into pending review. Your review routes it to active instruction-grade, evidence only, or restricted and rejected. Recall searches active memories and feeds the agent's context.">
  <defs>
    <style>
      .lbl  { font-family: "Cascadia Code","SF Mono",ui-monospace,Menlo,monospace; }
      .navy { fill:#1e3a5f; }
      .blue { fill:#2f6fb0; }
      .green{ fill:#2f8f5b; }
      .slate{ fill:#64748b; }
    </style>
    <marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#1e3a5f" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr4g" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#2f8f5b" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- writeback -->
  <g>
    <rect x="24" y="52" width="184" height="64" rx="5"
          fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="2"/>
    <text class="lbl navy" x="116" y="78" font-size="12" text-anchor="middle">workflow writeback</text>
    <text class="lbl slate" x="116" y="98" font-size="10" text-anchor="middle">provenance: generated</text>
  </g>

  <line x1="208" y1="84" x2="244" y2="84" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arr4)"/>

  <!-- guardrails -->
  <g>
    <rect x="248" y="60" width="142" height="48" rx="4"
          fill="#ffffff" stroke="#64748b" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text class="lbl slate" x="319" y="80" font-size="11" text-anchor="middle">guardrails</text>
    <text class="lbl slate" x="319" y="96" font-size="10" text-anchor="middle">secrets · size checks</text>
  </g>

  <line x1="390" y1="84" x2="426" y2="84" stroke="#1e3a5f" stroke-width="1.6" marker-end="url(#arr4)"/>

  <!-- pending -->
  <g>
    <rect x="430" y="56" width="142" height="56" rx="5"
          fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="2"/>
    <text class="lbl navy" x="501" y="89" font-size="12" text-anchor="middle">pending review</text>
  </g>

  <!-- review arrows -->
  <g stroke="#1e3a5f" stroke-width="1.6" fill="none">
    <path d="M 572 70 C 610 60, 620 50, 648 46" marker-end="url(#arr4)"/>
    <path d="M 572 92 C 606 100, 618 106, 648 110" marker-end="url(#arr4)"/>
    <path d="M 572 104 C 612 124, 620 160, 648 172" marker-end="url(#arr4)"/>
  </g>
  <text class="lbl slate" x="610" y="32" font-size="10" text-anchor="middle">your review</text>

  <!-- outcomes -->
  <rect x="652" y="24" width="126" height="42" rx="5"
        fill="#2f8f5b" fill-opacity="0.07" stroke="#2f8f5b" stroke-width="2"/>
  <text class="lbl green" x="715" y="50" font-size="11.5" text-anchor="middle">instruction</text>

  <rect x="652" y="90" width="126" height="42" rx="5"
        fill="#2f6fb0" fill-opacity="0.06" stroke="#2f6fb0" stroke-width="2"/>
  <text class="lbl navy" x="715" y="116" font-size="11.5" text-anchor="middle">evidence only</text>

  <rect x="652" y="156" width="126" height="42" rx="5"
        fill="#64748b" fill-opacity="0.06" stroke="#64748b" stroke-width="1.8"/>
  <text class="lbl slate" x="715" y="182" font-size="11.5" text-anchor="middle">restricted</text>

  <!-- agent context -->
  <g>
    <rect x="300" y="206" width="270" height="56" rx="5"
          fill="#1e3a5f" fill-opacity="0.05" stroke="#1e3a5f" stroke-width="2"/>
    <text class="lbl navy" x="435" y="230" font-size="12" text-anchor="middle">agent context</text>
    <text class="lbl slate" x="435" y="249" font-size="10" text-anchor="middle">chat system prompt · $memory.recall</text>
  </g>

  <!-- recall edge -->
  <path d="M 652 60 C 600 100, 600 190, 574 222" fill="none"
        stroke="#2f8f5b" stroke-width="1.6" marker-end="url(#arr4g)"/>
  <text class="lbl slate" x="608" y="232" font-size="10" text-anchor="start">recall: search × recency</text>
</svg>
