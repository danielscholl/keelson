# Adversarial review of an arbitrary artifact (a claim, design, analysis, plan,
# or diff): three reviewers attack it in parallel, `verify` re-checks their
# claims against source, and `synthesize` issues one consensus verdict. Fan-out
# -> synthesize skeleton adapted from Archon's parallel-review workflows (MIT,
# see NOTICE).
#
# The artifact is untrusted input, so the reviewers and the synthesizer run with
# no tools at all — they receive it inlined as the intake node's output, so no
# prompt node reads it from disk and injected text has nothing to act on. Only
# the deterministic `intake` bash node reads a user-supplied file path, and only
# `verify` holds filesystem tools, solely to check source claims. `model: auto`
# avoids pinning a model id; like the other bundled workflows it sets
# `provider: copilot`.

name: adversarial-review
provider: copilot
model: auto
description: |
  Use when: User wants an artifact stress-tested by independent agents that
            debate it and reach a consensus verdict — a claim, design doc,
            root-cause analysis, plan, spec, or diff.
  Triggers: "adversarial review", "pressure-test this", "debate this",
            "poke holes in", "review this and reach consensus", "have agents
            argue about".
  Does: Captures the artifact, runs three adversarial reviewers in parallel
        (logic, evidence, risk lenses), independently re-verifies their
        load-bearing claims against source, then synthesizes one verdict —
        CONFIRMED / CONFIRMED-WITH-CHANGES / REFUTED — with the surviving
        claims, the dissent, and what is still unverified.
  NOT for: Building or fixing code (use adversarial-build / fix-issue), posting
           a GitHub PR review (use pr-review), or generating something new.

nodes:
  - id: intake
    timeout: 30000
    bash: |
      set -euo pipefail
      RAW="$KEELSON_ARGUMENTS"
      TRIMMED=$(printf '%s' "$RAW" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')

      if [ -z "$TRIMMED" ]; then
        echo "No artifact provided — pass text or a file path as the argument." >&2
        exit 1
      fi

      # Status goes to stderr so stdout carries only the artifact — that stdout
      # is this node's output, which the downstream nodes inline (no file read).
      if [ -f "$TRIMMED" ]; then
        if [ ! -s "$TRIMMED" ]; then
          echo "Artifact file is empty: $TRIMMED" >&2
          exit 1
        fi
        echo "Artifact loaded from file: $TRIMMED ($(wc -c < "$TRIMMED" | tr -d ' ') bytes)" >&2
        # `--` so a path beginning with `-` is not read as a cat option.
        cat -- "$TRIMMED"
      else
        # Inline text rides the bash env channel, which head/tail-truncates at
        # 16 KiB and marks the seam. Gate the marker check on near-cap size so an
        # ordinary artifact that merely quotes the marker text (this workflow
        # reviewing itself, say) is not mistaken for a truncated one.
        BYTES=$(printf '%s' "$RAW" | wc -c | tr -d ' ')
        if [ "$BYTES" -gt 16384 ] && printf '%s' "$RAW" | grep -q '\[keelson: input truncated'; then
          echo "Inline artifact exceeded the 16 KiB argument limit and was truncated." >&2
          echo "Pass a file path instead: --arguments /path/to/artifact.md" >&2
          exit 1
        fi
        echo "Artifact captured from inline text ($(printf '%s' "$RAW" | wc -c | tr -d ' ') bytes)" >&2
        printf '%s\n' "$RAW"
      fi

  # Three reviewers run in parallel with `context: fresh` so none sees another's
  # take, and with no tools — they reason over the inlined artifact alone.
  - id: reviewer-logic
    depends_on: [intake]
    context: fresh
    allowed_tools: []
    prompt: |
      You are an adversarial reviewer on a LOGIC lens. Your job is to find where
      the artifact's reasoning fails — not to praise it. Default to skeptical.

      ## Artifact
      $intake.output

      Attack it on internal soundness:
      - What are its load-bearing claims and the conclusion resting on them?
      - Does the conclusion actually follow, or is there a gap / leap?
      - What assumptions are unstated, and would the argument collapse if one is
        false?
      - Is there an alternative explanation the artifact dismisses too fast?
      - Any internal contradiction, circular reasoning, or equivocation?

      ## Output (markdown)

      A short list. For EACH load-bearing claim:
      - **Claim**: quote or paraphrase it in one line.
      - **Verdict**: HOLDS · DUBIOUS · REFUTED
      - **Why**: one or two sentences — the specific logical flaw, or why it holds.
      - **What would settle it**: the evidence or check that would resolve it.

      End with a one-line **Lens lean**: does the artifact's core hold on logic
      alone, hold-with-changes, or fail?

  - id: reviewer-evidence
    depends_on: [intake]
    context: fresh
    allowed_tools: []
    prompt: |
      You are an adversarial reviewer on an EVIDENCE lens. Your job is to
      separate what the artifact SHOWS from what it merely ASSERTS. Default to
      skeptical: an unsupported claim is dubious until evidenced.

      ## Artifact
      $intake.output

      For every factual, technical, or empirical claim:
      - Is it backed by concrete evidence (a citation, a file:line, a command
        output, a measurement) — or just asserted with confidence?
      - Are cited sources actually load-bearing, or decorative?
      - Which claims are externally checkable (against source code, a spec, a
        standard, a benchmark) and therefore MUST be verified before trust?

      ## Output (markdown)

      A short list. For EACH claim that carries weight:
      - **Claim**: one line.
      - **Verdict**: SHOWN · ASSERTED · CONTRADICTED-BY-COMMON-KNOWLEDGE
      - **Why**: what evidence exists or is missing.
      - **Needs verification**: YES/NO — and if YES, exactly what a verifier
        should check (name the file, symbol, spec, or fact).

      End with a **Claims to verify** section: a plain bullet list of the
      specific checkable claims the next node must independently confirm.

  - id: reviewer-risk
    depends_on: [intake]
    context: fresh
    allowed_tools: []
    prompt: |
      You are an adversarial reviewer on a RISK / FEASIBILITY lens. Assume the
      artifact's proposal or conclusion is adopted as-is. Your job is to find
      what breaks. Default to skeptical.

      ## Artifact
      $intake.output

      Attack it on consequences and completeness:
      - If this is acted on, what breaks in practice? Edge cases, failure modes,
        second-order effects the artifact ignores?
      - What does it OMIT — a case, a platform, a constraint, a dependency, a
        rollback path?
      - For a plan/fix/design: where is it under-specified enough to go wrong on
        implementation? What is the riskiest step?
      - Is the scope right — over-built, or missing a load-bearing piece?

      ## Output (markdown)

      A short list. For EACH risk or gap:
      - **Issue**: one line.
      - **Severity**: BLOCKING · MAJOR · MINOR
      - **Why**: the concrete failure it leads to.
      - **Mitigation**: the change that would neutralize it.

      End with a one-line **Lens lean**: safe to adopt, adopt-with-changes, or
      do not adopt.

  # The load-bearing node: it re-derives the checkable claims from source rather
  # than relaying any reviewer's citation. Default trigger_rule (all_success) —
  # a consensus verdict is not issued on a panel where a lane failed.
  - id: verify
    depends_on: [reviewer-logic, reviewer-evidence, reviewer-risk]
    context: fresh
    allowed_tools: [Read, Glob, Grep]
    prompt: |
      You are an independent verifier. Three reviewers flagged claims in an
      artifact; your mandate is to CHECK the checkable ones against ground truth,
      trusting no one — not the artifact, not the reviewers. Reviewers' own
      citations are frequently wrong; re-derive, don't relay.

      ## The artifact
      $intake.output

      ## What the reviewers flagged to verify
      $reviewer-evidence.output

      Additional load-bearing claims from the other lenses:

      ### Logic lens
      $reviewer-logic.output

      ### Risk lens
      $reviewer-risk.output

      ## Task

      Pick the claims that are actually checkable here — those that resolve
      against source code, files, a config, or a well-established fact. For each,
      go look: use Read/Glob/Grep to inspect the real source (you are running in
      the caller's working directory — if it is the repo the artifact concerns,
      the files are here).

      Do NOT accept a claim because it sounds right or because two reviewers
      agree. Find the actual line. If a claim depends on something not present in
      this working directory or on an external fact you cannot check with these
      tools, mark it UNVERIFIABLE-HERE rather than guessing.

      ## Output (markdown)

      For EACH claim you checked:
      - **Claim**: one line.
      - **Result**: CONFIRMED · REFUTED · UNVERIFIABLE-HERE
      - **Evidence**: the specific `file:line` / symbol / fact you found, or why
        it could not be checked. Quote the decisive snippet when you refute.

      End with **Corrections**: any claim in the artifact or a reviewer's output
      that your check proved wrong — stated plainly.

  # Read-only: the artifact and reviewer text are untrusted, so synthesis holds
  # no tools. Its printed verdict is the workflow's output (it lands in the run
  # record; the scratch $ARTIFACTS_DIR does not survive the run).
  - id: synthesize
    depends_on: [verify]
    context: fresh
    allowed_tools: []
    prompt: |
      You are the presiding synthesizer. Three adversarial reviewers and one
      independent verifier examined an artifact. Reach a consensus verdict —
      weighting the VERIFIER over the reviewers wherever they conflict, because
      the verifier checked source and the reviewers reasoned from the text.

      ## Artifact
      $intake.output

      ## Logic lens
      $reviewer-logic.output

      ## Evidence lens
      $reviewer-evidence.output

      ## Risk lens
      $reviewer-risk.output

      ## Independent verification (authoritative on facts)
      $verify.output

      ## Task

      1. State the artifact's central claim/proposal in one line.
      2. Give the **verdict**: CONFIRMED · CONFIRMED-WITH-CHANGES · REFUTED.
         - CONFIRMED: core holds; verification found nothing that breaks it.
         - CONFIRMED-WITH-CHANGES: core survives but named claims must be fixed,
           or named risks addressed, before it is sound.
         - REFUTED: a load-bearing claim failed verification or logic.
      3. **Per-claim table**: each load-bearing claim → HOLDS / FIX / FAILS, with
         the one fact or argument that decided it (cite the verifier when it ran
         the check). If the verifier corrected the artifact, the correction wins.
      4. **Dissent**: where the reviewers genuinely split, or where a lens
         disagrees with the verdict — name it, don't smooth it over. If there is
         no real disagreement, say so.
      5. **Open questions**: what remains UNVERIFIABLE-HERE and would need a
         human, a different tool, or a live check to settle.
      6. **If CONFIRMED-WITH-CHANGES or REFUTED**: the shortest list of concrete
         changes that would move it to CONFIRMED.

      Print the full verdict as your response — it is this workflow's output.
