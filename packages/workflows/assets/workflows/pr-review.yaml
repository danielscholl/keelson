# Smart PR review. Concept ported from Archon's archon-smart-pr-review
# (MIT, see NOTICE), but rewritten as a self-contained DAG that uses only
# Copilot models and Keelson's supported node types — no `command:` refs,
# no `mcp:` blocks (notification is a stretch goal).
#
# Read-only by harness rail: every review lane sets
# `allowed_tools: [Read, Glob, Grep]` and the only intended PR-mutating step
# is the final `forge pr review-batch` call. Both providers enforce this — claude
# gates by tool name, copilot (the pin below) gates the underlying capability
# through its permission handler, so the model's built-in write/shell tools
# are denied mid-review regardless of provider. An opus triage gate
# de-dupes findings, adversarially verifies each one against the diff and
# repo, and drops refuted / confidence < 80 / LOW findings before the review
# is assembled and posted as line-anchored inline comments.

name: pr-review
provider: copilot
model: auto
description: |
  Use when: User wants a smart, scoped code review of an existing PR or MR
            that adapts to the PR's complexity and posts the synthesis as
            line-anchored inline review comments as a single batched review.
  Triggers: "review pr", "review #123", "smart pr review", "review this pr",
            "code review pr".
  Does: Fetches PR scope -> classifies complexity and which review lanes are
        relevant -> runs only those lanes (code review always, plus error
        handling / test coverage / docs impact when applicable) ->
        runs an opus triage gate to de-dupe and filter noise ->
        posts findings as a batched PR/MR review with line-anchored inline
        comments and suggestion blocks.
  NOT for: Fixing an issue (use fix-issue). Mutating the PR branch.

# Model `auto` lets Copilot route each node and keeps this bundled workflow
# portable — a hard-pinned id fails on accounts that don't expose it. Pin a
# specific available id here or per-node for determinism. Resolution order is
# node.model → workflow.model → provider.defaultModel.

# Repo-scoped: the run's working directory must be a git repository.
requiresProject: true

nodes:
  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 1: SCOPE
  # Resolve the PR number, capture the diff scope, and persist a short
  # markdown brief to $ARTIFACTS_DIR/scope.md that every downstream lane
  # reads. Bash so we don't burn AI tokens on a `forge` call.
  # ─────────────────────────────────────────────────────────────────────────

  - id: extract-pr
    model: auto
    prompt: |
      Find the PR or MR number for this request.

      Request: $ARGUMENTS

      Rules:
      - If the message contains an explicit PR number ("#42", "PR 42", "42"),
        extract it.
      - If the message is ambiguous, return the literal string CURRENT — the
        next node will resolve it from the current branch.

      CRITICAL: Output ONLY the bare integer, or the literal CURRENT. No quotes,
      no markdown, no explanation.

  - id: scope
    depends_on: [extract-pr]
    bash: |
      set -euo pipefail
      RAW=$(printf '%s' "$KEELSON_NODE_extract_pr_OUTPUT" | tr -d "'\"\`\n " )

      if [ "$RAW" = "CURRENT" ] || [ -z "$RAW" ]; then
        # Resolve from the current branch.
        PR_NUM=$(forge pr view --json number -q '.number' 2>/dev/null || echo "")
      else
        PR_NUM=$(printf '%s' "$RAW" | grep -oE '[0-9]+' | head -1)
      fi

      if [ -z "$PR_NUM" ]; then
        echo "Could not resolve a PR number — pass one like 'review pr 42' or run from a PR branch." >&2
        exit 1
      fi

      echo "$PR_NUM" > "$KEELSON_ARTIFACTS_DIR/.pr-number"
      forge pr view "$PR_NUM" --json number,title,body,baseRefName,headRefName,author,labels,state,url > "$KEELSON_ARTIFACTS_DIR/pr.json"

      BASE=$(jq -r '.baseRefName' "$KEELSON_ARTIFACTS_DIR/pr.json")
      HEAD=$(jq -r '.headRefName' "$KEELSON_ARTIFACTS_DIR/pr.json")

      # Make sure we have the base branch locally for diff comparison.
      git fetch origin "$BASE" --quiet 2>/dev/null || true

      DIFF_STAT=$(forge pr diff "$PR_NUM" --name-only 2>/dev/null || true)
      DIFF_BODY=$(forge pr diff "$PR_NUM" 2>/dev/null || true)

      printf '%s\n' "$DIFF_STAT" > "$KEELSON_ARTIFACTS_DIR/changed-files.txt"
      printf '%s\n' "$DIFF_BODY" > "$KEELSON_ARTIFACTS_DIR/diff.patch"

      FILE_COUNT=$(printf '%s\n' "$DIFF_STAT" | grep -c . || true)
      FILE_COUNT=${FILE_COUNT:-0}
      LINE_COUNT=$(printf '%s\n' "$DIFF_BODY" | wc -l | tr -d ' ')

      cat > "$KEELSON_ARTIFACTS_DIR/scope.md" <<EOF
      # PR #${PR_NUM} scope

      - Title: $(jq -r '.title' "$KEELSON_ARTIFACTS_DIR/pr.json")
      - Author: $(jq -r '.author.login' "$KEELSON_ARTIFACTS_DIR/pr.json")
      - Base → Head: ${BASE} ← ${HEAD}
      - Files changed: ${FILE_COUNT}
      - Diff lines: ${LINE_COUNT}
      - URL: $(jq -r '.url' "$KEELSON_ARTIFACTS_DIR/pr.json")

      ## Changed files

      \`\`\`
      ${DIFF_STAT}
      \`\`\`
      EOF

      echo "PR_NUMBER=${PR_NUM}"
      echo "FILE_COUNT=${FILE_COUNT}"
      echo "LINE_COUNT=${LINE_COUNT}"
      echo ""
      cat "$KEELSON_ARTIFACTS_DIR/scope.md"

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 2: CLASSIFY
  # Decide which review lanes are worth running.
  # ─────────────────────────────────────────────────────────────────────────

  # Booleans are typed as string enums "true"/"false" so the downstream
  # `when:` clauses can compare against a quoted literal — substitute renders
  # JSON booleans as unquoted `true`/`false`, which wouldn't match `== 'true'`.
  - id: classify
    depends_on: [scope]
    model: auto
    context: fresh
    output_format:
      type: object
      required:
        [
          run_code_review,
          run_error_handling,
          run_test_coverage,
          run_docs_impact,
          complexity,
          reasoning,
        ]
      properties:
        run_code_review:
          type: string
          enum: ["true", "false"]
        run_error_handling:
          type: string
          enum: ["true", "false"]
        run_test_coverage:
          type: string
          enum: ["true", "false"]
        run_docs_impact:
          type: string
          enum: ["true", "false"]
        complexity:
          type: string
          enum: [trivial, small, medium, large]
        reasoning: { type: string }
    prompt: |
      You are a PR review classifier. Decide which review lanes to run based on
      the scope below.

      ## Scope

      $scope.output

      ## Rules

      - **Code review**: always run UNLESS the diff is empty or only touches
        non-code files (README only, .yaml only, license).
      - **Error handling**: run if the diff touches code with try/catch, error
        handling, async/await, or adds new failure paths.
      - **Test coverage**: run if the diff touches source code (i.e. anything
        other than tests / docs / config).
      - **Docs impact**: run if the diff adds, removes, or renames public
        APIs, CLI flags, env vars, or user-facing features.

      Pick a complexity bucket from the file count and diff size in the scope:
      - **trivial**: typo / format / version bump / single-line
      - **small**: 1-3 files, no architectural change
      - **medium**: 4-10 files, moderate logic change
      - **large**: 10+ files, architectural change, new subsystem

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 3: REVIEW LANES (conditional, parallel)
  # Each lane reads `$ARTIFACTS_DIR/diff.patch` directly so they don't
  # collide on the same prompt context.
  # Each finding must include: path:line, severity, confidence (0-100),
  # what, why, fix — so the triage gate has all inputs it needs.
  # ─────────────────────────────────────────────────────────────────────────

  - id: code-review
    depends_on: [classify]
    when: "$classify.output.run_code_review == 'true'"
    context: fresh
    allowed_tools: [Read, Glob, Grep]
    prompt: |
      You are a senior reviewer. Do a correctness-and-conventions pass on the
      PR diff at `$ARTIFACTS_DIR/diff.patch`.

      ## Scope

      $scope.output

      ## Instructions

      1. Read `CLAUDE.md` for project conventions before reading the diff.
      2. Read the diff patch file. For each hunk worth flagging, write one finding.
      3. Look for: correctness bugs, race conditions, missing input validation,
         dead code, broken invariants, naming inconsistencies, CLAUDE.md drift.
      4. Also check the footguns reviews miss: moved or extracted code that
         dropped a guard or condition on the way, flipped config defaults,
         narrowed lock or transaction scope, and version/constant drift between
         files that must agree (a bump applied in one place but not its siblings).
      5. Skip anything stylistic that Biome / TS will catch on its own.

      ## Output

      Markdown list. Each finding:
      - `path:line` — `severity` (CRITICAL | HIGH | MEDIUM | LOW) — `confidence` (0-100)
      - **What**: one sentence
      - **Why it matters**: the concrete failure scenario — the input, state, or
        sequence that triggers it and the wrong outcome, not "could cause issues"
      - **Suggested fix**: one or two lines, code where useful

  - id: error-handling
    depends_on: [classify]
    when: "$classify.output.run_error_handling == 'true'"
    context: fresh
    allowed_tools: [Read, Glob, Grep]
    prompt: |
      Audit the error-handling story of the PR.

      ## Scope

      $scope.output

      ## Instructions

      Read `$ARTIFACTS_DIR/diff.patch`. For each new or modified failure path:
      - Is the error caught at the right boundary?
      - Is the error message actionable for the operator?
      - Does the caller learn enough to recover (or fail loudly)?
      - Are any `catch` blocks swallowing errors silently?
      - Are promise rejections / async stack traces preserved?

      ## Output

      Same finding shape as the code review (path:line, severity, confidence (0-100), what, why, fix).
      If the diff has no new error paths worth flagging, say so in one line.

  - id: test-coverage
    depends_on: [classify]
    when: "$classify.output.run_test_coverage == 'true'"
    context: fresh
    allowed_tools: [Read, Glob, Grep]
    prompt: |
      Audit test coverage for the PR.

      ## Scope

      $scope.output

      ## Instructions

      1. Read `$ARTIFACTS_DIR/changed-files.txt`. Separate source files from
         test files.
      2. For every source file that changed, check whether a corresponding test
         file was touched in the same PR.
      3. For each newly-added branch / condition in the source, verify a test
         exercises it. If not, flag it.
      4. Don't demand tests for trivial pass-throughs or pure type changes.

      ## Output

      Same finding shape (path:line, severity, confidence (0-100), what, why, fix). In `why`,
      name the concrete untested branch and the input that would expose it.
      Tag missing tests with severity HIGH if the new code can branch on bad
      input or external state; MEDIUM otherwise.

  - id: docs-impact
    depends_on: [classify]
    when: "$classify.output.run_docs_impact == 'true'"
    model: auto
    context: fresh
    allowed_tools: [Read, Glob, Grep]
    prompt: |
      Audit user-facing documentation impact for the PR.

      ## Scope

      $scope.output

      ## Instructions

      Read `$ARTIFACTS_DIR/diff.patch`. For each:
      - Added / removed / renamed CLI flag, env var, command, or public API
      - Behavior change visible to a human operator

      Check whether `README.md`, `CLAUDE.md`, `CONTRIBUTING.md`, or other
      user-facing docs were updated in the same PR. If not, flag it.

      ## Output

      Same finding shape (path:line, severity, confidence (0-100), what, why, fix). In `why`,
      name the doc claim that goes stale and who it misleads. Skip if the diff
      has no user-facing surface change.

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 4: TRIAGE
  # Opus judge de-dupes lane findings, adversarially verifies each candidate
  # against the diff and repo (read-only tools), and emits a structured
  # findings[] array. Drops REFUTED, LOW, confidence < 80, and pre-existing
  # issues. `trigger_rule: one_success` so we proceed even if a conditional
  # lane was skipped or one lane failed.
  # ─────────────────────────────────────────────────────────────────────────

  - id: triage
    depends_on: [code-review, error-handling, test-coverage, docs-impact]
    trigger_rule: one_success
    context: fresh
    model: claude-opus-4-8
    allowed_tools: [Read, Glob, Grep]
    output_format:
      type: object
      required: [verdict, summary, findings]
      properties:
        verdict:
          type: string
          enum: ["READY TO MERGE", "NEEDS NITS", "NEEDS FIXES"]
        summary: { type: string }
        findings:
          type: array
          items:
            type: object
            required: [path, line, severity, confidence, what, why, fix]
            properties:
              path: { type: string }
              line: { type: integer }
              severity:
                type: string
                enum: [CRITICAL, HIGH, MEDIUM]
              confidence: { type: integer }
              what: { type: string }
              why: { type: string }
              fix: { type: string }
    prompt: |
      You are the PR review triage judge. Four independent lanes produced
      candidate findings (a section may be empty if that lane was skipped).
      Verify the candidates against the actual code; keep only what survives.

      ## Scope summary
      $scope.output

      ## Code review findings
      $code-review.output

      ## Error handling findings
      $error-handling.output

      ## Test coverage findings
      $test-coverage.output

      ## Docs impact findings
      $docs-impact.output

      De-duplicate the candidates, then ADVERSARIALLY VERIFY each unique one:
      read `$ARTIFACTS_DIR/diff.patch` and the relevant source files and
      actively try to REFUTE it. A candidate is refuted when the code already
      handles the claimed case, the claim misreads the diff, the issue is
      pre-existing rather than introduced by this PR, or a
      linter/type-checker/CI gate already catches it. A survivor is CONFIRMED
      when you traced the failure in the actual code (confidence 85-100), or
      PLAUSIBLE when you could not refute it but could not fully trace it
      either (confidence capped at 79).

      Keep ONLY CRITICAL/HIGH/MEDIUM survivors with confidence >= 80 — the
      PLAUSIBLE cap sits below the keep line, so only CONFIRMED findings
      post; re-trace a PLAUSIBLE candidate to CONFIRMED or let it drop. Drop
      everything else as noise, including all LOW-severity findings and
      pedantic nitpicks. Rank most severe first and cap the list at 10; when the cap
      forces a cut, correctness findings outrank test-coverage and docs
      findings of equal severity. For each kept finding emit:
      - path: the file path exactly as it appears in the diff
      - line: the line number on the RIGHT (new) side of the diff
      - severity: CRITICAL | HIGH | MEDIUM
      - confidence: integer 0-100
      - what: one sentence describing the problem
      - why: the concrete failure scenario or cost, one or two sentences —
        what input, state, or reader hits it and what goes wrong
      - fix: the exact replacement for THAT anchored line (one or two lines).
        A suggestion block replaces the anchored line when applied — so when
        the real change belongs in another file, spans code away from the
        anchor, or the anchored line is already correct, set fix to "" and
        name the needed change inside `why` instead.

      Set verdict from the highest severity in findings:
      - CRITICAL or HIGH present → "NEEDS FIXES"
      - only MEDIUM present → "NEEDS NITS"
      - no findings (empty list) → "READY TO MERGE"

      summary is one sentence on the PR's overall health.

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 5: BUILD REVIEW PAYLOAD
  # Pure offline step: anchor findings to diff lines, build the review payload.
  # No network calls.
  # ─────────────────────────────────────────────────────────────────────────

  - id: build-review
    depends_on: [triage]
    bash: |
      set -euo pipefail

      ARTIFACTS="$KEELSON_ARTIFACTS_DIR"
      TRIAGE_JSON="$ARTIFACTS/triage.json"
      DIFF="$ARTIFACTS/diff.patch"
      PAYLOAD="$ARTIFACTS/payload.json"

      printf '%s' "$KEELSON_NODE_triage_OUTPUT" > "$TRIAGE_JSON"

      # Build anchorable set: path<TAB>newline<TAB>content for every RIGHT-side
      # line in the diff (added AND context) — content so the suggestion gate
      # below can detect a no-op fix. Parse the hunk header by field-splitting,
      # not a 3-arg match() — that form is gawk-only and errors on BSD awk / mawk.
      awk '
        /^\+\+\+ b\// { file = substr($0, 7); next }
        /^@@ / { split($3, p, ","); new_line = substr(p[1], 2) - 1; next }
        /^\+/ && file != "" { new_line++; print file "\t" new_line "\t" substr($0, 2); next }
        /^ / && file != "" { new_line++; print file "\t" new_line "\t" substr($0, 2); next }
      ' "$DIFF" > "$ARTIFACTS/anchorable.txt"

      VERDICT=$(jq -r '.verdict' "$TRIAGE_JSON")
      SUMMARY=$(jq -r '.summary' "$TRIAGE_JSON")

      # Hash the STABLE finding identity (path/line/severity) only — not the
      # LLM-generated confidence/what/why/fix prose, which varies run to run and
      # would make the idempotency marker never match on a re-review.
      HASH=$(jq -cS '[.findings[] | {path, line, severity}] | sort_by(.path, .line, .severity)' "$TRIAGE_JSON" | (sha256sum 2>/dev/null || shasum -a 256) | awk '{print $1}')

      # Partition findings into anchored comments and fallback bullets.
      COMMENTS='[]'
      FALLBACK=''

      while IFS= read -r finding; do
        PATH_F=$(printf '%s' "$finding" | jq -r '.path')
        LINE_F=$(printf '%s' "$finding" | jq -r '.line')
        SEV=$(printf '%s' "$finding" | jq -r '.severity')
        WHAT=$(printf '%s' "$finding" | jq -r '.what')
        WHY=$(printf '%s' "$finding" | jq -r '.why')
        FIX=$(printf '%s' "$finding" | jq -r '.fix')

        if cut -f1,2 "$ARTIFACTS/anchorable.txt" 2>/dev/null | grep -qxF "${PATH_F}"$'\t'"${LINE_F}"; then
          # A suggestion block replaces the anchored line when applied, so gate
          # it: no fix, or a fix byte-identical to the line's current content (a
          # cross-file fix the model anchored here anyway), posts as prose only.
          # Raw comparison — an indentation-only change is a real fix.
          CURRENT=$(awk -v pre="${PATH_F}\t${LINE_F}\t" \
            'index($0, pre) == 1 { print substr($0, length(pre) + 1); exit }' \
            "$ARTIFACTS/anchorable.txt")
          FIX_T=$(printf '%s' "$FIX" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
          if [ -n "$FIX_T" ] && [ "$FIX" != "$CURRENT" ]; then
            BODY=$(printf '**%s** — %s\n\n%s\n\n```suggestion\n%s\n```' "$SEV" "$WHAT" "$WHY" "$FIX")
          else
            BODY=$(printf '**%s** — %s\n\n%s' "$SEV" "$WHAT" "$WHY")
          fi
          COMMENT=$(jq -n \
            --arg p "$PATH_F" \
            --argjson l "$LINE_F" \
            --arg b "$BODY" \
            '{path:$p, line:$l, side:"RIGHT", body:$b}')
          COMMENTS=$(printf '%s' "$COMMENTS" | jq ". + [$COMMENT]")
        else
          FALLBACK="${FALLBACK}"$'\n'"- **${SEV}** \`${PATH_F}\` — ${WHAT}"
        fi
      done < <(jq -c '.findings[]' "$TRIAGE_JSON" 2>/dev/null || true)

      # Assemble review body.
      BODY="## Smart PR Review\n\n**Verdict: ${VERDICT}**\n\n${SUMMARY}"
      if [ -n "$FALLBACK" ]; then
        BODY="${BODY}\n\n### Findings not anchorable to the diff\n${FALLBACK}"
      fi
      BODY="${BODY}\n\n<!-- keelson:pr-review:${HASH} -->"

      jq -n \
        --arg body "$(printf '%b' "$BODY")" \
        --argjson comments "$COMMENTS" \
        '{event:"COMMENT", body:$body, comments:$comments}' \
        > "$PAYLOAD"

      ANCHORED=$(jq '.comments | length' "$PAYLOAD")
      TOTAL=$(jq '.findings | length' "$TRIAGE_JSON")
      echo "Payload built: ${ANCHORED}/${TOTAL} finding(s) anchored inline, verdict=${VERDICT}, hash=${HASH}"
      echo "Payload written to: $PAYLOAD"

  # ─────────────────────────────────────────────────────────────────────────
  # PHASE 6: POST REVIEW (idempotent)
  # Checks for an existing review with the same content-hash marker before
  # posting, so re-runs don't pile up duplicate reviews.
  # ─────────────────────────────────────────────────────────────────────────

  - id: post-review
    depends_on: [build-review]
    bash: |
      set -euo pipefail

      ARTIFACTS="$KEELSON_ARTIFACTS_DIR"
      PR_NUM=$(cat "$ARTIFACTS/.pr-number")
      PAYLOAD="$ARTIFACTS/payload.json"

      # Extract the content hash from the payload body for idempotency check.
      HASH=$(grep -oE 'keelson:pr-review:[a-f0-9]+' "$PAYLOAD" | head -1 | cut -d: -f3 || true)

      if [ -n "$HASH" ]; then
        EXISTING=$(forge pr reviews "$PR_NUM" --json body -q '.[].body' 2>/dev/null || true)
        if printf '%s' "$EXISTING" | grep -qF "keelson:pr-review:${HASH}"; then
          echo "No change since last review — skipping (hash=${HASH})"
          forge pr view "$PR_NUM" --json url -q '.url'
          exit 0
        fi
      fi

      forge pr review-batch "$PR_NUM" --input "$PAYLOAD"

      echo "Posted review on PR #${PR_NUM}"
      forge pr view "$PR_NUM" --json url -q '.url'
